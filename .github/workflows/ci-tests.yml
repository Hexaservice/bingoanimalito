name: CI Tests

on:
  pull_request:
  push:
    branches: [main, staging, dev]

jobs:
  lightweight-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Detectar cambios en imágenes de loterías
        id: loterias-images
        uses: tj-actions/changed-files@v46
        with:
          files: public/img/loterias/**
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Regenerar manifest de loterías si hubo cambios
        if: steps.loterias-images.outputs.any_changed == 'true'
        run: npm run generate:loterias-manifest
      - name: Validar manifest de loterías versionado
        if: steps.loterias-images.outputs.any_changed == 'true'
        run: |
          if [[ -n "$(git status --porcelain public/img/loterias/manifest.json)" ]]; then
            echo "::error::public/img/loterias/manifest.json está desactualizado. Ejecuta npm run generate:loterias-manifest y sube el cambio."
            exit 1
          fi
      - name: Aviso de pruebas largas deshabilitadas
        run: |
          echo "Se omitieron pruebas de Jest en CI para reducir consumo de minutos de GitHub Actions."
          echo "Incluye syncClaims, rollback operativo y suites relacionadas de alto costo temporal."
