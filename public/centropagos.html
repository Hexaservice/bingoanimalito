    async function reconciliarIndicadorPagos(){
      try {
        const estadoPorSorteo = new Map();
        premiosActivos.forEach(registro => {
          if(!registro.sorteoId) return;
          const info = estadoPorSorteo.get(registro.sorteoId) || { pendientesPremios: 0, pendientesPagos: 0 };
          info.pendientesPremios = (info.pendientesPremios || 0) + obtenerConteoTecnicoPremio(registro);
          estadoPorSorteo.set(registro.sorteoId, info);
        });
        pagosAdminActivos.forEach(registro => {
          if(!registro.sorteoId) return;
          const info = estadoPorSorteo.get(registro.sorteoId) || { pendientesPremios: 0, pendientesPagos: 0 };
          if(esEstadoPendiente(registro.estado)){ info.pendientesPagos = (info.pendientesPagos || 0) + 1; }
          estadoPorSorteo.set(registro.sorteoId, info);
        });
        premiosArchivados.forEach(registro => {
          if(!registro.sorteoId) return;
          if(!estadoPorSorteo.has(registro.sorteoId)){
            estadoPorSorteo.set(registro.sorteoId, { pendientesPremios: 0, pendientesPagos: 0 });
          }
        });
        pagosAdminArchivados.forEach(registro => {
          if(!registro.sorteoId) return;
          if(!estadoPorSorteo.has(registro.sorteoId)){
            estadoPorSorteo.set(registro.sorteoId, { pendientesPremios: 0, pendientesPagos: 0 });
          }
        });
        if(!estadoPorSorteo.size) return;
        const tareas = [];
        estadoPorSorteo.forEach((info, sorteoId)=>{
          const sinPendientes = (info.pendientesPremios || 0) === 0 && (info.pendientesPagos || 0) === 0;
          const previo = indicadorPagosCache.get(sorteoId);
          indicadorPagosCache.set(sorteoId, sinPendientes);
          if(sinPendientes && previo !== true){
            tareas.push(actualizarIndicadorPagosSorteo(sorteoId));
          }
        });
        if(tareas.length){
          await Promise.all(tareas);
        }
      } catch (err) {
        console.warn('No se pudo reconciliar el indicador de pagos', err);
      }
    }

    async function resolverBilleteraPremio(enRegistro = {}){
      const candidataDirecta = cpNormalizarEmail(enRegistro.billetera || enRegistro.gmail || enRegistro.email || '');
      if(candidataDirecta) return candidataDirecta;
      await ensureFirebaseListo();
      const db = dbRef();
      const userIds = [];
      if(enRegistro.userId){ userIds.push(String(enRegistro.userId).trim()); }
      if(Array.isArray(enRegistro.userIds)){
        enRegistro.userIds.forEach(uid=>{
          const valor = (uid || '').toString().trim();
          if(valor) userIds.push(valor);
        });
      }

      for(const uid of userIds){
        try {
          const porUid = await db.collection('users').where('uid','==',uid).limit(1).get();
          if(!porUid.empty){
            const info = porUid.docs[0].data() || {};
            const email = cpNormalizarEmail(info.email || porUid.docs[0].id || '');
            if(email) return email;
          }
        } catch (err) {
          console.warn('No se pudo resolver billetera por uid', uid, err);
        }
      }

      const alias = (enRegistro.alias || '').toString().trim();
      if(alias){
        try {
          const porAlias = await db.collection('users').where('alias','==',alias).limit(1).get();
          if(!porAlias.empty){
            const info = porAlias.docs[0].data() || {};
            const email = cpNormalizarEmail(info.email || porAlias.docs[0].id || '');
            if(email) return email;
          }
        } catch (err) {
          console.warn('No se pudo resolver billetera por alias', alias, err);
        }
      }

      return '';
    }

    async function acreditarPremioEnFirestore(enRegistro){
      const db = dbRef();
      const premioRef = db.collection('PremiosSorteos').doc(enRegistro.id);
      const creditos = Math.max(0, Number(enRegistro.creditos) || 0);
      const cartones = Math.max(0, Number(enRegistro.cartones ?? enRegistro.cartonesGratis) || 0);
      const billeteraId = await resolverBilleteraPremio(enRegistro);
      if(!billeteraId){
        throw new Error('No se encontró una billetera destino para el premio.');
      }
      if(!creditos && !cartones){
        throw new Error('El premio no tiene créditos ni cartones para acreditar.');
      }

      await db.runTransaction(async tx => {
        const premioSnap = await tx.get(premioRef);
        if(!premioSnap.exists){
          throw new Error('El premio ya no existe en PremiosSorteos.');
        }
        const premioActual = premioSnap.data() || {};
        const estadoActual = normalizarEstado(premioActual.estado);
        if(window.EstadosPagoPremio.estaFinalizado(estadoActual)) return;

        const billeteraRef = db.collection('Billetera').doc(billeteraId);
        const billeteraSnap = await tx.get(billeteraRef);
        const billeteraData = billeteraSnap.exists ? billeteraSnap.data() || {} : {};
        const saldoCreditos = Number(billeteraData.creditos) || 0;
        const saldoCartones = Number(billeteraData.CartonesGratis ?? billeteraData.cartonesGratis) || 0;

        tx.set(billeteraRef, {
          creditos: saldoCreditos + creditos,
          CartonesGratis: saldoCartones + cartones,
          actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        tx.set(premioRef, {
          estado: validarEstadoGuardado('APROBADO', `PremiosSorteos:${enRegistro.id}`),
          idBilletera: billeteraId,
          fechaGestion: fechaServidor(),
          horaGestion: horaServidor(),
          gestionadoPor: authInstance().currentUser?.email || '',
          rolGestor: window.currentRole || '',
          actualizadoEn: firebase.firestore.FieldValue.serverTimestamp(),
          source: 'centropagos/manual-aprobacion'
        }, { merge: true });
      });

      await registrarTransaccionPremio({
        ...enRegistro,
        billetera: billeteraId,
        creditos,
        cartones,
        tipotrans: 'premio',
        origen: 'premios_jugadores',
        referencia: 'PREMIO'
      });
    }

    async function registrarTransaccionPremio(enRegistro){
      const monto = Number(enRegistro.creditos) || 0;
      if(!enRegistro.billetera || monto <= 0) return;
      try {
        if(typeof fechaServidor !== 'function' || typeof horaServidor !== 'function'){
          await initServerTime();
        }
        await dbRef().collection('transacciones').add({
          tipotrans: (enRegistro.tipotrans || 'pago').toString().toLowerCase(),
          origen: (enRegistro.origen || 'pagos_administracion').toString().toLowerCase(),
          Monto: monto,
          estado: validarEstadoGuardado('APROBADO', 'TransaccionPagoAdministracion'),
          IDbilletera: enRegistro.billetera,
          fechasolicitud: '',
          horasolicitud: '',
          fechagestion: typeof fechaServidor === 'function' ? fechaServidor() : '',
          horagestion: typeof horaServidor === 'function' ? horaServidor() : '',
          usuariogestor: authInstance().currentUser?.email || '',
          rolusuario: window.currentRole || '',
          referencia: (enRegistro.referencia || 'PAGO').toString(),
          sorteoId: enRegistro.sorteoId || '',
          sorteoNombre: (enRegistro.sorteoNombre || 'Pago a colaborador').toString(),
          creadoEn: firebase.firestore.FieldValue.serverTimestamp()
        });
      } catch (err) {
        console.error('No se pudo registrar la transacción de pago administrativo', err);
      }
    }

    async function acreditarPago(enRegistro){
      const db = dbRef();
      if(!enRegistro.billetera) return null;
      const creditos = Number(enRegistro.creditos) || 0;
      if(!creditos) return null;
      let nuevoSaldo = null;
      await db.runTransaction(async tx => {
        const billeteraRef = db.collection('Billetera').doc(enRegistro.billetera);
        const billeteraDoc = await tx.get(billeteraRef);
        const datos = billeteraDoc.exists ? billeteraDoc.data() : {};
        const saldoActual = Number(datos.creditos) || 0;
        nuevoSaldo = Math.max(0, saldoActual + creditos);
        tx.set(billeteraRef, { creditos: nuevoSaldo }, { merge: true });
      });
      if(creditos > 0){
        const origenSeguro = enRegistro.origen
          || ((enRegistro.tipotrans || '').toString().toLowerCase() === 'pago'
            ? 'pagos_administracion'
            : '');
        await registrarTransaccionPremio({ ...enRegistro, creditos, cartones: 0, origen: origenSeguro });
      }
      return nuevoSaldo;
    }

    async function procesarPremiosJugadores(ids){
      if(!ids.length) return;
      await initServerTime();
      const sorteosActualizados = new Set();
      const errores = [];
      let procesados = 0;
      let omitidos = 0;
      for(const id of ids){
        const registro = premiosMapa.get(id);
        if(!registro){
          console.warn('Premio no encontrado', id);
          omitidos += 1;
          continue;
        }
        if(window.EstadosPagoPremio.estaFinalizado(registro.estado)){
          omitidos += 1;
          continue;
        }
        try {
          await acreditarPremioEnFirestore(registro);
          procesados += 1;
          if(registro.sorteoId){
            sorteosActualizados.add(registro.sorteoId);
          }
        } catch (err) {
          console.error('Error aprobando premio', err);
          errores.push(id);
        }
      }
      if(sorteosActualizados.size){
        try {
          await Promise.all(Array.from(sorteosActualizados).map(actualizarIndicadorPagosSorteo));
        } catch (errIndicador) {
          console.warn('No se pudo actualizar el indicador de pagos tras aprobar premios', errIndicador);
        }
      }
      if(errores.length){
        alert(`Se procesaron ${procesados} premio(s). ${errores.length} registro(s) no se pudieron procesar.`);
        return;
      }
      if(procesados > 0 || omitidos > 0){
        alert(`Proceso finalizado. Premios procesados: ${procesados}. Registros omitidos: ${omitidos}.`);
      }
    }

    async function aprobarPagos(ids){
      if(!ids.length) return;
      const db = dbRef();
      await initServerTime();
      const sorteosActualizados = new Set();
      for(const id of ids){
        const registro = pagosAdminMapa.get(id);
        if(!registro){ console.warn('Pago no encontrado', id); continue; }
        if(window.EstadosPagoPremio.estaFinalizado(registro.estado)){ continue; }
        try {
          await db.runTransaction(async tx => {
            const ref = db.collection('PagosAdministracion').doc(id);
            const snap = await tx.get(ref);
            if(!snap.exists) return;
            const data = snap.data();
            const estadoActual = normalizarEstado(data.estado);
            if(window.EstadosPagoPremio.estaFinalizado(estadoActual)) return;
            tx.update(ref, {
              estado: validarEstadoGuardado('APROBADO', `PagosAdministracion:${id}`),
              fechaGestion: fechaServidor(),
              horaGestion: horaServidor(),
              gestionadoPor: authInstance().currentUser?.email || '',
              rolGestor: window.currentRole || ''
            });
          });
          await acreditarPago({ ...registro, tipotrans: 'pago', origen: 'pagos_administracion' });
          if(registro.sorteoId){
            sorteosActualizados.add(registro.sorteoId);
          }
        } catch (err) {
          console.error('Error aprobando pago', err);
          alert('Ocurrió un error al aprobar un pago. Revisa la consola para más detalles.');
          break;
        }
      }
      if(sorteosActualizados.size){
        try {
          await Promise.all(Array.from(sorteosActualizados).map(actualizarIndicadorPagosSorteo));
        } catch (errIndicador) {
          console.warn('No se pudo actualizar el indicador de pagos tras aprobar pagos', errIndicador);
        }
      }
    }

    async function aprobarPagosColaboradores(ids){
      if(!ids.length) return;
      await ensureFirebaseListo();
      await initServerTime();
      const procesados = [];
      let asignacionesPositivas = 0;
      let ajustesNegativos = 0;
      for(const id of ids){
        const registro = pagosColaboradoresMapa.get(id);
        if(!registro){ console.warn('Usuario no encontrado para asignación manual', id); continue; }
        const valorEdicion = pagosColaboradoresEdicion.has(id)
          ? pagosColaboradoresEdicion.get(id)
          : '';
        const monto = Number(valorEdicion);
        if(!Number.isFinite(monto) || monto === 0){
          alert('Para asignar créditos manuales debes ingresar un monto distinto de cero.');
          return;
        }
        const billetera = cpNormalizarEmail(registro.gmail || id);
        if(!billetera){
          alert('No se pudo determinar la billetera del usuario seleccionado.');
          return;
        }
        const esPositivo = monto > 0;
        const referencia = esPositivo ? 'PAGO' : 'AJUSTE_MANUAL';
        const tipoTransaccion = esPositivo ? 'pago' : 'ajuste_colaborador';
        try {
          const saldoActualizado = await acreditarPago({
            ...registro,
            billetera,
            creditos: monto,
            sorteoId: '',
            sorteoNombre: 'Pago a colaborador',
            referencia,
            tipotrans: tipoTransaccion,
            origen: 'pagos_administracion'
          });
          const saldoSeguro = Number.isFinite(saldoActualizado)
            ? Number(saldoActualizado)
            : Math.max(0, (Number(registro.creditosActuales) || 0) + monto);
          registro.creditosActuales = saldoSeguro;
          registro.creditos = saldoSeguro;
          guardarInfoUsuarioCache({
            email: billetera,
            alias: registro.alias,
            nombre: registro.nombre,
            tipo: registro.tipo,
            telefono: registro.telefono,
            creditos: saldoSeguro,
            cartonesGratis: registro.cartonesGratis || 0,
            completo: true
          });
          procesados.push(registro.nombre || billetera);
          if(esPositivo){
            asignacionesPositivas++;
          } else {
            ajustesNegativos++;
          }
        } catch (err) {
          console.error('Error asignando créditos manuales', err);
          alert('Ocurrió un error al procesar la asignación manual. Revisa la consola para más detalles.');
          return;
        }
      }
      pagosColaboradoresEdicion.clear();
      const tabla = document.getElementById('tabla-colaboradores');
      if(tabla){
        tabla.querySelectorAll('tbody input[type="checkbox"]').forEach(chk=>{ chk.checked = false; });
        tabla.querySelectorAll('.colab-input').forEach(input=>{ input.disabled = true; input.value = ''; });
      }
      if(procesados.length){
        const partes = [];
        if(asignacionesPositivas){ partes.push(`${asignacionesPositivas} asignación(es) positiva(s)`); }
        if(ajustesNegativos){ partes.push(`${ajustesNegativos} ajuste(s) negativo(s)`); }
        const detalle = partes.length ? ` (${partes.join(' y ')})` : '';
        alert(`Se procesaron ${procesados.length} registro(s) de colaboradores${detalle}.`);
      }
      renderColaboradores();
    }

    async function archivarRegistros(ids, tipo){
      if(!ids.length) return;
      const db = dbRef();
      await initServerTime();
      let coleccionBase = db.collection('PagosAdministracion');
      let coleccionArchivo = db.collection('PagosAdministracionArchivo');
      if(tipo === 'premios'){
        coleccionBase = db.collection('PremiosSorteos');
        coleccionArchivo = db.collection('PremiosSorteosArchivo');
      }
      for(const id of ids){
        try {
          await db.runTransaction(async tx => {
            const ref = coleccionBase.doc(id);
            const snap = await tx.get(ref);
            if(!snap.exists) return;
            const data = snap.data();
            const datosArchivo = {
              ...data,
              estado: validarEstadoGuardado('ARCHIVADO', `${tipo}:${id}`),
              archivadoEn: fechaServidor(),
              horaArchivado: horaServidor(),
              archivadoPor: authInstance().currentUser?.email || ''
            };

            tx.delete(ref);
          });
        } catch (err) {
          console.error('Error archivando registro', tipo, err);
          alert('No se pudo archivar uno de los registros seleccionados.');
          break;
        }
      }
    }

      contenidoPremios.style.display = 'none';

      const togglePagos = document.getElementById('toggle-pagos');
      const contenidoPagos = document.getElementById('pagos-content');
      togglePagos.addEventListener('change', ()=>{ contenidoPagos.style.display = togglePagos.checked ? 'block' : 'none'; });
      contenidoPagos.style.display = 'none';

      const toggleColaboradores = document.getElementById('toggle-colaboradores');
      const contenidoColaboradores = document.getElementById('colaboradores-content');
      toggleColaboradores.addEventListener('change', ()=>{ contenidoColaboradores.style.display = toggleColaboradores.checked ? 'block' : 'none'; });
      contenidoColaboradores.style.display = 'none';

      document.getElementById('volver-btn').addEventListener('click', e=>volverConFallback(e));
    }

    function obtenerRegistroPorTipo(tipo, id){
      if(tipo === 'premios'){ return premiosMapa.get(id) || premiosArchivoMapa.get(id) || null; }
      if(tipo === 'pagos'){ return pagosAdminMapa.get(id) || pagosAdminArchivoMapa.get(id) || null; }
      return null;
    }

    function configurarInteraccionesTablas(){
      const tablaColaboradores = document.getElementById('tabla-colaboradores');
      if(tablaColaboradores){
        tablaColaboradores.addEventListener('click', async e => {
          if(e.target.closest('input,button,select,textarea')) return;
          const fila = e.target.closest('tr[data-id]');
          if(!fila) return;
          const id = fila.dataset.id;
          const registro = pagosColaboradoresMapa.get(id);
          if(!registro) return;
          if(e.target.closest('td.gmail')){
            let nombre = registro.nombre || registro.alias || '';
            if(!nombre){
              const info = await obtenerInfoUsuarioDetallada(registro.gmail, registro.alias || registro.nombre);
              nombre = info?.nombre || info?.alias || '';
            }
            mostrarModalInfo('Nombre del usuario', nombre || 'Sin nombre registrado.');
            return;
          }
          if(e.target.closest('td.creditos-actuales')){
            const info = await obtenerInfoUsuarioDetallada(registro.gmail, registro.alias || registro.nombre);
            const cartones = Number(info?.cartonesGratis ?? registro.cartonesGratis ?? 0);
            mostrarModalInfo('Cartones gratis', `Cartones gratis actuales: ${formatNumberEntero.format(Math.round(cartones))}`);
          }
        });
      }

      const tablaPremios = document.getElementById('tabla-premios');
      if(tablaPremios){
        tablaPremios.addEventListener('click', async e => {
          if(e.target.closest('input,button,select,textarea')) return;
          const fila = e.target.closest('tr[data-id]');
          if(!fila) return;
          const id = fila.dataset.id;
          const registro = obtenerRegistroPorTipo('premios', id);
          if(!registro) return;
          if(e.target.closest('td.creditos')){
            const sorteo = cpResolverNombreSorteo(registro) || registro.sorteoId || 'Sin sorteo asociado.';
            mostrarModalInfo('Sorteo asignado', sorteo || 'Sin sorteo asociado.');
            return;
          }
          if(e.target.closest('td.gmail')){
            let alias = registro.alias;
            if(!alias){
              const info = await obtenerInfoUsuarioDetallada(registro.gmail, registro.alias);
              alias = info?.alias || '';
            }
            mostrarModalInfo('Alias del usuario', alias || 'Sin alias registrado.');
            return;
          }
          if(e.target.closest('td.cart')){
            const info = await obtenerInfoUsuarioDetallada(registro.gmail, registro.alias);
            const cartones = Number(info?.cartonesGratis) || 0;
            mostrarModalInfo('Cartones gratis', `Cartones gratis actuales: ${formatNumberEntero.format(Math.round(cartones))}`);
          }
        });
      }

      const tablaPagos = document.getElementById('tabla-pagos');
      if(tablaPagos){
        tablaPagos.addEventListener('click', async e => {
          if(e.target.closest('input,button,select,textarea')) return;
          const fila = e.target.closest('tr[data-id]');
          if(!fila) return;
          const id = fila.dataset.id;
          const registro = obtenerRegistroPorTipo('pagos', id);
          if(!registro) return;
          if(e.target.closest('td.creditos')){
            const sorteo = cpResolverNombreSorteo(registro) || registro.sorteoId || 'Sin sorteo asociado.';
            mostrarModalInfo('Sorteo asignado', sorteo || 'Sin sorteo asociado.');
            return;
          }
          if(e.target.closest('td.gmail')){
            let nombre = registro.nombre || '';
            if(!nombre){
              const info = await obtenerInfoUsuarioDetallada(registro.gmail, registro.alias || registro.nombre);
              nombre = info?.nombre || info?.alias || '';
            }
            mostrarModalInfo('Nombre del usuario', nombre || 'Sin nombre registrado.');
          }
        });
      }
    }

    let intentoRetornoActivo = false;

    function volverConFallback(event){
      if(event){ event.preventDefault(); }
      if(intentoRetornoActivo){
        intentoRetornoActivo = false;
        window.location.href = 'cantarsorteos.html';
        return;
      }
      if(window.history.length > 1){
        intentoRetornoActivo = true;
        setTimeout(()=>{
          if(intentoRetornoActivo){
            intentoRetornoActivo = false;
            window.location.href = 'cantarsorteos.html';
          }
        }, 600);
        window.history.back();
        return;
      }
      intentoRetornoActivo = false;
      const role = (window.currentRole)||'';
      if(role === 'Administrador'){ window.location.href = 'admin.html'; }
      else if(role === 'Superadmin'){ window.location.href = 'super.html'; }
      else { window.location.href = 'cantarsorteos.html'; }
    }

    function suscribirColecciones(){
      const db = dbRef();
      unsubscribePremios = db.collection('PremiosSorteos').onSnapshot(snapshot => {
        premiosActivos.length = 0;
        premiosMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPremio(doc.id, doc.data());
          if(!registro) return;
          premiosActivos.push(registro);
          premiosMapa.set(doc.id, registro);
        });
        renderPremios();
      });
      unsubscribePremiosArchivo = db.collection('PremiosSorteosArchivo').onSnapshot(snapshot => {
        premiosArchivados.length = 0;
        premiosArchivoMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPremio(doc.id, doc.data());
          if(!registro) return;
          registro.estado = normalizarEstado(doc.data().estado || 'ARCHIVADO');
          premiosArchivados.push(registro);
          premiosArchivoMapa.set(doc.id, registro);
        });
        if(mostrarPremiosArchivo) renderPremios();
      });
      unsubscribePagos = db.collection('PagosAdministracion').onSnapshot(snapshot => {
        pagosAdminActivos.length = 0;
        pagosAdminMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPago(doc.id, doc.data());
          pagosAdminActivos.push(registro);
          pagosAdminMapa.set(doc.id, registro);
        });
        renderPagos();
      });
      unsubscribePagosArchivo = db.collection('PagosAdministracionArchivo').onSnapshot(snapshot => {
        pagosAdminArchivados.length = 0;
        pagosAdminArchivoMapa.clear();
        snapshot.forEach(doc => {
          const registro = prepararPago(doc.id, doc.data());
          registro.estado = normalizarEstado(doc.data().estado || 'ARCHIVADO');
          pagosAdminArchivados.push(registro);
          pagosAdminArchivoMapa.set(doc.id, registro);
        });
        if(mostrarPagosArchivo) renderPagos();
      });


      unsubscribeUsuariosCentro = db.collection('users').onSnapshot(async snapshot => {
        colaboradoresBase.length = 0;
        pagosColaboradoresEdicion.clear();
        const tareas = [];
        snapshot.forEach(doc => {
          const data = doc.data() || {};
          const email = cpNormalizarEmail(data.email || doc.id);
          if(!email) return;
          const tipo = normalizarTipoUsuario(data.role || data.rol || data.rolinterno || '');
          const tipoLower = tipo.toLowerCase();
          if(!['colaborador','administrador','superadmin'].includes(tipoLower)) return;
          const nombre = (data.nombre || data.name || data.alias || '').toString();
          const alias = (data.alias || '').toString();
          const telefono = (data.telefono || data.Telefono || data.celular || data.whatsapp || data.phoneNumber || '').toString();
          const registro = {
            id: email,
            gmail: email,
            nombre,
            alias,
            creditos: 0,
            creditosActuales: 0,
            fechaMostrar: '-',
            fechaFiltro: '',
            fechaOrden: 0,
            estado: tipo,
            tipo,
            billetera: email,
            telefono,
            cartonesGratis: 0
          };
          colaboradoresBase.push(registro);
          guardarInfoUsuarioCache({ email, alias, nombre, tipo, telefono, completo: false });
          tareas.push((async()=>{
            const billetera = await obtenerDatosBilletera(email);
            registro.creditosActuales = billetera.creditos;
            registro.cartonesGratis = billetera.cartonesGratis;
            registro.creditos = billetera.creditos;
            guardarInfoUsuarioCache({
              email,
              alias,
              nombre,
              tipo,
              telefono,
              creditos: billetera.creditos,
              cartonesGratis: billetera.cartonesGratis,
              completo: true
            });
          })());
        });
        actualizarColaboradoresDesdeBase();
        renderColaboradores();
        if(tareas.length){
          try {
            await Promise.all(tareas);
          } catch (err) {
            console.warn('No se pudieron sincronizar algunas billeteras', err);
          }
          actualizarColaboradoresDesdeBase();
          renderColaboradores();
        }
      });
    }

    window.addEventListener('beforeunload', ()=>{
      [
        unsubscribePremios,
        unsubscribePremiosArchivo,
        unsubscribePagos,
        unsubscribePagosArchivo,
        unsubscribeUsuariosCentro
      ].forEach(unsub=>{
        if(typeof unsub === 'function') unsub();
      });
    });

    async function iniciarCentroPagos(){
      configurarFiltros();
      configurarBotones();
      configurarInteraccionesTablas();
      try {
        await ensureFirebaseListo();
      } catch (err) {
        console.error('No se pudo inicializar Firebase para Centro de Pagos', err);
        alert('No fue posible inicializar la conexión con la base de datos. Intenta recargar la página.');
        return;
      }
      await cpCargarSelectorSorteos();
      suscribirColecciones();
    }

    iniciarCentroPagos();
  </script>
  <script src="js/backNavigation.js"></script>
</body>
</html>
