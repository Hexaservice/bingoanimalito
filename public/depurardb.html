<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depurar Base de Datos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
                        url('img/fondo-dinero-porcentage.jpg');
      background-repeat: repeat;
      background-size: auto;
      background-position: 0 0, 0 0;
      animation: fondo-movimiento 120s linear infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      font-family: 'Bangers', cursive;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    @keyframes fondo-movimiento {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 0 0, -600px 600px; }
    }

    .menu-btn {
      width: 250px;
      height: 60px;
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      background: rgba(0, 170, 255, 0.8);
      color: white;
      border: 4px solid #FFD700;
      border-radius: 10px;
      text-shadow: 2px 2px 4px #000;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      margin: 5px;
    }

    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }

    .back-btn {
      position: fixed;
      top: 5px;
      left: 5px;
      width: 120px;
      height: 40px;
      background: orange;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .content-box {
      width: min(90vw, 700px);
      background: rgba(255, 255, 255, 0.82);
      border: 3px solid rgba(255, 215, 0, 0.85);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
      font-family: Calibri, Arial, sans-serif;
    }

    .content-box p {
      margin: 0;
      color: #333;
      font-size: 1rem;
      line-height: 1.45;
    }

    .panel-depuracion {
      margin-top: 18px;
      text-align: left;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-depuracion h3 {
      margin: 0;
      color: #111827;
      font-size: 1.1rem;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: #4caf50; }
    input:checked + .slider:before { transform: translateX(18px); }

    .panel-body {
      display: none;
    }

    .panel-body.visible {
      display: block;
    }

    .sorteos-lista {
      max-height: 280px;
      overflow: auto;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 8px;
      background: #f8fafc;
      margin-bottom: 12px;
    }

    .sorteo-item {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .sorteo-item:last-child { margin-bottom: 0; }

    .sorteo-item strong {
      color: #111827;
      font-size: 0.95rem;
    }

    .sorteo-item span {
      color: #4b5563;
      font-size: 0.82rem;
    }

    .sorteo-detalles {
      min-width: 0;
    }

    .linea-principal,
    .linea-secundaria {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .linea-secundaria { margin-top: 2px; }

    .estado-sorteo {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .estado-activo { color: #15803d; }
    .estado-inactivo { color: #b91c1c; }
    .estado-archivado { color: #7c2d12; }

    .fecha-creacion {
      color: #1e3a8a;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .accion-depurar {
      width: 100%;
      height: 56px;
      margin: 10px 0;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
    }

    .accion-previsualizar {
      width: 100%;
      height: 56px;
      margin: 0 0 6px;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    .accion-depurar:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    .estado {
      min-height: 24px;
      margin-top: 4px;
      color: #111827;
      font-size: 0.95rem;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .estado.error { color: #b91c1c; }
    .estado.ok { color: #166534; }
  </style>
  <link rel="stylesheet" href="css/desktopFrame.css">
</head>
<body>
  <button id="volver-btn" class="menu-btn back-btn" data-compact-back="true">&#9664; Volver</button>

  <h2>Depurar Base de Datos</h2>
  <div class="content-box">
    <p>Selecciona un sorteo para borrar en cascada toda su data relacionada.</p>

    <div class="panel-depuracion">
      <div class="section-header">
        <h3>Depurar Sorteos</h3>
        <label class="switch" title="Mostrar sección Depurar Sorteos">
          <input type="checkbox" id="toggle-depuracion" aria-label="Mostrar sección Depurar Sorteos">
          <span class="slider"></span>
        </label>
      </div>
      <div id="panel-depuracion-body" class="panel-body" aria-hidden="true">
        <h3>Sorteos disponibles</h3>
        <div id="sorteos-lista" class="sorteos-lista" aria-live="polite">
          Cargando sorteos...
        </div>
        <button id="previsualizar-btn" class="menu-btn accion-previsualizar" disabled>Previsualizar</button>
        <button id="depurar-btn" class="menu-btn accion-depurar" disabled>Depurar</button>
        <div id="estado" class="estado" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <script src="js/logoSwitcher.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notificationCenter.js"></script>
  <script>
    ensureAuth('Administrador');

    const listaSorteosEl = document.getElementById('sorteos-lista');
    const previsualizarBtn = document.getElementById('previsualizar-btn');
    const depurarBtn = document.getElementById('depurar-btn');
    const estadoEl = document.getElementById('estado');
    const toggleDepuracionEl = document.getElementById('toggle-depuracion');
    const panelDepuracionBodyEl = document.getElementById('panel-depuracion-body');
    const volverBtn = document.getElementById('volver-btn');
    const PREVIEW_VALID_WINDOW_MS = 10 * 60 * 1000;

    let sorteos = [];
    let sorteoSeleccionado = null;
    let previsualizacionReciente = null;
    let previewEnCurso = false;
    let depuracionEnCurso = false;

    function setEstado(mensaje, tipo = '') {
      estadoEl.className = `estado ${tipo}`.trim();
      estadoEl.textContent = mensaje || '';
    }

    function actualizarBotonDepurar() {
      const hayPreviewValida = !!(
        sorteoSeleccionado
        && previsualizacionReciente
        && previsualizacionReciente.sorteoId === sorteoSeleccionado.id
        && (Date.now() - previsualizacionReciente.timestampMs) <= PREVIEW_VALID_WINDOW_MS
      );
      const operacionEnCurso = depuracionEnCurso || previewEnCurso;

      previsualizarBtn.disabled = !sorteoSeleccionado || operacionEnCurso;
      previsualizarBtn.textContent = previewEnCurso ? 'Previsualizando...' : 'Previsualizar';

      depurarBtn.disabled = !sorteoSeleccionado || operacionEnCurso || !hayPreviewValida;
      depurarBtn.textContent = depuracionEnCurso ? 'Depurando...' : 'Depurar';
    }

    function resolverEstadoSorteo(sorteo = {}) {
      const condicion = (sorteo.condicion || '').toString().trim().toUpperCase();
      const estado = (sorteo.estado || '').toString().trim().toUpperCase();

      if (condicion === 'ARCHIVADO') {
        return { label: 'ARCHIVADO', className: 'estado-archivado' };
      }

      if (estado === 'ACTIVO') {
        return { label: 'ACTIVO', className: 'estado-activo' };
      }

      return { label: 'INACTIVO', className: 'estado-inactivo' };
    }

    function formatearFechaCreacion(sorteo = {}) {
      const valor = sorteo.creado || sorteo.creadoEn || sorteo.createdAt || sorteo.fechaCreacion || null;
      let fecha = null;

      if (valor && typeof valor.toDate === 'function') {
        fecha = valor.toDate();
      } else if (valor instanceof Date) {
        fecha = valor;
      } else if (typeof valor === 'string' || typeof valor === 'number') {
        const parsed = new Date(valor);
        if (!Number.isNaN(parsed.getTime())) {
          fecha = parsed;
        }
      }

      if (!fecha) return 'Sin fecha';

      return fecha.toLocaleDateString('es-VE', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function renderSorteos() {
      sorteoSeleccionado = null;
      if (!Array.isArray(sorteos) || sorteos.length === 0) {
        listaSorteosEl.textContent = 'No hay sorteos disponibles para depurar.';
        actualizarBotonDepurar();
        return;
      }

      listaSorteosEl.innerHTML = '';
      sorteos.forEach((sorteo, index) => {
        const label = document.createElement('label');
        label.className = 'sorteo-item';

        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'sorteo-seleccion';
        radio.value = sorteo.id;
        radio.id = `sorteo-${index}`;
        radio.addEventListener('change', () => {
          sorteoSeleccionado = sorteo;
          if (previsualizacionReciente?.sorteoId !== sorteo.id) {
            previsualizacionReciente = null;
          }
          setEstado(`Sorteo seleccionado: ${sorteo.nombre} (${sorteo.id}).`);
          actualizarBotonDepurar();
        });

        const txt = document.createElement('div');
        txt.className = 'sorteo-detalles';

        const lineaPrincipal = document.createElement('div');
        lineaPrincipal.className = 'linea-principal';

        const nombre = document.createElement('strong');
        nombre.textContent = sorteo.nombre;

        const estado = resolverEstadoSorteo(sorteo);
        const estadoEl = document.createElement('span');
        estadoEl.className = `estado-sorteo ${estado.className}`;
        estadoEl.textContent = estado.label;

        lineaPrincipal.appendChild(nombre);
        lineaPrincipal.appendChild(estadoEl);

        const lineaSecundaria = document.createElement('div');
        lineaSecundaria.className = 'linea-secundaria';

        const id = document.createElement('span');
        id.textContent = `ID: ${sorteo.id}`;

        const fechaCreacion = document.createElement('span');
        fechaCreacion.className = 'fecha-creacion';
        fechaCreacion.textContent = formatearFechaCreacion(sorteo);

        lineaSecundaria.appendChild(id);
        lineaSecundaria.appendChild(fechaCreacion);

        txt.appendChild(lineaPrincipal);
        txt.appendChild(lineaSecundaria);

        label.appendChild(radio);
        label.appendChild(txt);
        listaSorteosEl.appendChild(label);
      });
    }

    async function cargarSorteos() {
      setEstado('Cargando sorteos...');
      try {
        await initFirebase();
        const snap = await db.collection('sorteos').get();
        sorteos = [];
        snap.forEach((doc) => {
          const data = doc.data() || {};
          sorteos.push({
            id: doc.id,
            nombre: (typeof data.nombre === 'string' && data.nombre.trim()) ? data.nombre.trim() : '(Sin nombre)',
            estado: data.estado || '',
            condicion: data.condicion || '',
            creado: data.creado,
            creadoEn: data.creadoEn,
            createdAt: data.createdAt,
            fechaCreacion: data.fechaCreacion
          });
        });
        sorteos.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));
        renderSorteos();
        setEstado(`Se cargaron ${sorteos.length} sorteo(s).`);
      } catch (error) {
        console.error('No se pudieron cargar los sorteos', error);
        listaSorteosEl.textContent = 'Error cargando los sorteos.';
        setEstado('No se pudieron cargar los sorteos. Intenta nuevamente.', 'error');
      }
    }

    async function ejecutarPurgeSorteo({ dryRun }) {
      await initFirebase();
      const user = auth.currentUser;
      if (!user) {
        throw new Error('No hay sesión activa para autorizar la depuración.');
      }

      const idToken = await user.getIdToken(true);
      const apiBase = typeof getAdminApiBase === 'function' ? getAdminApiBase() : '';
      const response = await fetch(`${apiBase}/admin/purge-sorteo`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${idToken}`
        },
        body: JSON.stringify({
          sorteoId: sorteoSeleccionado.id,
          sorteoNombre: sorteoSeleccionado.nombre,
          dryRun
        })
      });

      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        const mensajeError = payload.error || payload.message || `Error HTTP ${response.status}`;
        if (response.status === 405) {
          throw new Error('Error HTTP 405: el endpoint /admin/purge-sorteo no está aceptando POST en esta URL. Revisa UPLOAD_ENDPOINT, rewrites de Firebase Hosting y que uploadServer esté desplegado/corriendo.');
        }
        throw new Error(mensajeError);
      }
      return payload;
    }

    async function depurarSorteo() {
      if (depuracionEnCurso || !sorteoSeleccionado) return;

      const hayPreviewValida = !!(
        previsualizacionReciente
        && previsualizacionReciente.sorteoId === sorteoSeleccionado.id
        && (Date.now() - previsualizacionReciente.timestampMs) <= PREVIEW_VALID_WINDOW_MS
      );

      if (!hayPreviewValida) {
        setEstado('Debes generar una previsualización reciente del mismo sorteo antes de depurar.', 'error');
        actualizarBotonDepurar();
        return;
      }

      const mensajeConfirmacion =
        `¿Segura que deseas borrar en cascada todos los datos del sorteo ${sorteoSeleccionado.nombre}?\n\n` +
        'Esta acción eliminará registros relacionados en múltiples colecciones y no se puede deshacer.';

      const confirmado = await window.confirm(mensajeConfirmacion);
      if (!confirmado) {
        setEstado('Depuración cancelada por la usuaria.');
        return;
      }

      depuracionEnCurso = true;
      actualizarBotonDepurar();
      setEstado(`Depuración en progreso para ${sorteoSeleccionado.nombre} (${sorteoSeleccionado.id})...`);

      try {
        const payload = await ejecutarPurgeSorteo({ dryRun: false });

        const conteos = payload.deletedCounts || {};
        const resumen = Object.keys(conteos)
          .map((key) => `• ${key}: ${conteos[key]}`)
          .join('\n');

        setEstado(
          `Depuración completada para ${sorteoSeleccionado.nombre} (${sorteoSeleccionado.id}).\n\nConteos eliminados:\n${resumen}`,
          'ok'
        );

        previsualizacionReciente = null;
        await cargarSorteos();
      } catch (error) {
        console.error('Error depurando sorteo', error);
        setEstado(`No se pudo completar la depuración: ${error.message}`, 'error');
      } finally {
        depuracionEnCurso = false;
        actualizarBotonDepurar();
      }
    }

    async function previsualizarSorteo() {
      if (previewEnCurso || !sorteoSeleccionado) return;

      previewEnCurso = true;
      actualizarBotonDepurar();
      setEstado(`Generando previsualización para ${sorteoSeleccionado.nombre} (${sorteoSeleccionado.id})...`);

      try {
        const payload = await ejecutarPurgeSorteo({ dryRun: true });

        const conteos = payload.deletedCounts || {};
        const resumen = Object.keys(conteos)
          .map((key) => `• ${key}: ${conteos[key]}`)
          .join('\n');

        previsualizacionReciente = {
          sorteoId: sorteoSeleccionado.id,
          timestampMs: Date.now()
        };

        setEstado(
          `Previsualización completada para ${sorteoSeleccionado.nombre} (${sorteoSeleccionado.id}).\n\nDocumentos detectados:\n${resumen}`,
          'ok'
        );
      } catch (error) {
        console.error('Error previsualizando depuración', error);
        previsualizacionReciente = null;
        setEstado(`No se pudo generar la previsualización: ${error.message}`, 'error');
      } finally {
        previewEnCurso = false;
        actualizarBotonDepurar();
      }
    }

    function togglePanelDepuracion() {
      const visible = !!toggleDepuracionEl.checked;
      panelDepuracionBodyEl.classList.toggle('visible', visible);
      panelDepuracionBodyEl.setAttribute('aria-hidden', String(!visible));
    }

    function volverAlMenuAdministrador() {
      window.location.href = 'admin.html';
    }

    previsualizarBtn.addEventListener('click', previsualizarSorteo);
    depurarBtn.addEventListener('click', depurarSorteo);
    toggleDepuracionEl.addEventListener('change', togglePanelDepuracion);
    volverBtn.addEventListener('click', (event) => {
      event.preventDefault();
      volverAlMenuAdministrador();
    });

    toggleDepuracionEl.checked = false;
    togglePanelDepuracion();
    cargarSorteos();
  </script>
  <script src="js/backNavigation.js"></script>
</body>
</html>
