    function normalizarEstadoPremioTransaccion(valor){
      if(window.EstadosPagoPremio && typeof window.EstadosPagoPremio.normalizarLectura==='function'){
        return window.EstadosPagoPremio.normalizarLectura(valor, (valor||'').toString().trim().toUpperCase());
      }
      const texto=(valor||'').toString().trim().toUpperCase();
      return texto==='REALIZADO'?'APROBADO':texto;
    }

    function normalizarTransaccionParaTabla(id,data){
      const payload={...(data||{})};
      payload.fechasolicitud=formatearFecha(payload.fechasolicitud);
      payload.fechagestion=formatearFecha(payload.fechagestion);
      const tipoNormalizado = normalizarTipoTransaccion(payload);
      const estadoNormalizado = normalizarEstadoPremioTransaccion(payload.estado || '');
      return {id,...payload, estado: estadoNormalizado, tipotrans: tipoNormalizado};
    }

    function sincronizarTransaccionesEnTabla(){
      transacciones.length=0;
      const premiosEnProyeccion=new Set();
      transaccionesPremioProyeccion.forEach((valor)=>{
        transacciones.push(valor);
        const llave=(valor.eventoGanadorId||valor.winnerKey||valor.id||'').toString();
        if(llave){ premiosEnProyeccion.add(llave); }
      });

      transaccionesGlobales.forEach((valor)=>{
        const tipo=(valor.tipotrans||'').toLowerCase();
        if(tipo==='premio'){
          const llave=(valor.eventoGanadorId||valor.winnerKey||valor.id||'').toString();
          if(llave && premiosEnProyeccion.has(llave)) return;
        }
        transacciones.push(valor);
      });

      transacciones.sort((a,b)=>{
        const da=parseFechaHora(a.fechagestion||a.fechasolicitud,a.horagestion||a.horasolicitud);
        const db=parseFechaHora(b.fechagestion||b.fechasolicitud,b.horagestion||b.horasolicitud);
        return db-da;
      });
      filtrarTransacciones();
    }

    function suscribirTransaccionesUsuario(){
      if(unsubscribePremiosProyeccion){
        unsubscribePremiosProyeccion();
        unsubscribePremiosProyeccion=null;
      }
      if(unsubscribeTransacciones){
        unsubscribeTransacciones();
        unsubscribeTransacciones=null;
      }
      transaccionesPremioProyeccion.clear();
      transaccionesGlobales.clear();

      const user=auth.currentUser;
      if(!user?.email) return;

      const identidadesLectura = Array.from(new Set([user.email, user.uid].filter(Boolean)));
      const premiosPorIdentidad = new Map();
      const transaccionesPorIdentidad = new Map();

      const resyncPremios = () => {
        transaccionesPremioProyeccion.clear();
        premiosPorIdentidad.forEach((mapaDocs)=>{
          mapaDocs.forEach((valor,id)=>{
            if(!transaccionesPremioProyeccion.has(id)){
              transaccionesPremioProyeccion.set(id, valor);
            }
          });
        });
        sincronizarTransaccionesEnTabla();
      };

      const resyncTransacciones = () => {
        transaccionesGlobales.clear();
        transaccionesPorIdentidad.forEach((mapaDocs)=>{
          mapaDocs.forEach((valor,id)=>{
            if(!transaccionesGlobales.has(id)){
              transaccionesGlobales.set(id, valor);
            }
          });
        });
        sincronizarTransaccionesEnTabla();
      };

      const unsubsPremios = identidadesLectura.map((identidad)=>db.collection('users').doc(identidad).collection('premios').onSnapshot(snapshot=>{
        const docs = new Map();
        snapshot.forEach(doc=>{
          const normalizado=normalizarTransaccionParaTabla(doc.id,doc.data()||{});
          docs.set(doc.id, normalizado);
        });
        premiosPorIdentidad.set(identidad, docs);
        resyncPremios();
      },error=>{
        console.error('Error escuchando la proyección de premios del usuario',error, identidad);
      }));

      unsubscribePremiosProyeccion = () => {
        unsubsPremios.forEach((fn)=>{ try{ fn(); }catch(_err){} });
      };

      const unsubsTransacciones = [
        db.collection('transacciones').where('IDbilletera','==',user.email).onSnapshot(snapshot=>{
          const docs = new Map();
          snapshot.forEach(doc=>{
            const normalizado=normalizarTransaccionParaTabla(doc.id,doc.data()||{});
            docs.set(doc.id,normalizado);
          });
          transaccionesPorIdentidad.set('emailVisible', docs);
          resyncTransacciones();
        },error=>{ console.error('Error escuchando transacciones de la billetera',error); })
      ];

      if(identidadesLectura.length){
        unsubsTransacciones.push(
          db.collection('transacciones').where('idBilleteraInterna','in',identidadesLectura).onSnapshot(snapshot=>{
            const docs = new Map();
            snapshot.forEach(doc=>{
              const normalizado=normalizarTransaccionParaTabla(doc.id,doc.data()||{});
              docs.set(doc.id,normalizado);
            });
            transaccionesPorIdentidad.set('idBilleteraInterna', docs);
            resyncTransacciones();
          },error=>{ console.error('Error escuchando transacciones por idBilleteraInterna',error); })
        );
      }

      unsubscribeTransacciones = () => {
        unsubsTransacciones.forEach((fn)=>{ try{ fn(); }catch(_err){} });
      };
    }

    function filtrarTransacciones(){
      const tipo=document.getElementById('filtro-tipo').value;
      const monto=document.getElementById('filtro-monto').value.trim();
      const fechaInput=document.getElementById('filtro-fecha').value;
      const fecha=fechaInput?fechaInput.split('-').reverse().join('/'):'';
      const estado=document.getElementById('filtro-estado').value;
      const tbody=document.querySelector('#tabla-transacciones tbody');
      tbody.innerHTML='';
      let n=1;
      transacciones.forEach(t=>{
        if(t.estado==='ARCHIVADO') return;
        if(tipo && t.tipotrans!==tipo) return;
        if(monto && parseFloat(t.Monto)!=parseFloat(monto)) return;
        const f=formatearFecha(t.estado==='PENDIENTE'?t.fechasolicitud:t.fechagestion);
        if(fecha && f!==fecha) return;
        if(estado && normalizarEstadoPremioTransaccion(t.estado)!==normalizarEstadoPremioTransaccion(estado)) return;
        const estadoNormalizado=normalizarEstadoPremioTransaccion(t.estado);
        const estadoColor=estadoNormalizado==='PENDIENTE'?'orange':estadoNormalizado==='ANULADO'?'red':(estadoNormalizado==='APROBADO' || estadoNormalizado==='ACEPTADO')?'green':'black';
        const tr=document.createElement('tr');
        const montoFmt=parseFloat(t.Monto).toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
        const tipoTrans=(t.tipotrans||'').toLowerCase();
        const cartonesGratisNum=Number(t.cartonesGratis)||0;
        const esRecarga=tipoTrans==='recarga';
        const esRetiro=tipoTrans==='retiro';
        const esPremio=tipoTrans==='premio';
        const esPago=tipoTrans==='pago';
        const esPremioCartones=esPremio && cartonesGratisNum>0 && (Number(t.Monto)||0)===cartonesGratisNum;
        const esResaltado=esPremio||esPago;
        const colorTipo=esRecarga?'green':esRetiro?'red':(esPremio?'#1b5e20':'#1b5e20');
        const montoTexto=esPremioCartones?String(cartonesGratisNum):montoFmt;
        const montoStyle=esPremioCartones
          ? 'background:#6a1b9a;color:#fff;font-weight:800;'
          : (esPremio?'color:#0a7d2a;font-weight:800;':(esPago?`background:#1b5e20;color:#fff;`:`color:${colorTipo};`));
        const fechaStyle=esResaltado?`color:#1b5e20;`:'';
        const celdas = [
          { texto: String(n) },
          { texto: tipoTrans.toUpperCase(), style: `color:${colorTipo}` },
          { texto: montoTexto, style: montoStyle, className: 'celda-monto' },
          { texto: f, style: fechaStyle, className: 'celda-fecha' },
          { texto: t.estado || '', style: `color:${estadoColor}` }
        ];

        celdas.forEach(celda=>{
          const td = document.createElement('td');
          td.textContent = celda.texto;
          if(celda.style) td.style.cssText = celda.style;
          if(celda.className) td.className = celda.className;
          tr.appendChild(td);
        });

        const fechaTd=tr.querySelector('.celda-fecha');
        fechaTd.style.cursor='pointer';
        fechaTd.addEventListener('click',()=>mostrarDetalle(t));
        const montoTd=tr.querySelector('.celda-monto');
        montoTd.style.cursor='pointer';
        montoTd.addEventListener('click',()=>mostrarDetalleMonto(t));
        const estadoTd=tr.lastElementChild;
        if(t.estado==='ANULADO' && t.nota){
          estadoTd.classList.add('nota-estado');
          estadoTd.addEventListener('click',e=>{e.stopPropagation();alert(t.nota);});
        }
        tbody.appendChild(tr);n++;});
      }

      function mostrarConfirmacionModal(mensaje){
        return new Promise(resolve=>{
          const modal=document.getElementById('modal-confirm');
          const texto=document.getElementById('modal-confirm-text');
          const btnAceptar=document.getElementById('modal-confirm-accept');
          const btnCancelar=document.getElementById('modal-confirm-cancel');
          const restaurarTutorial=pausarTutorialTemporal();
          if(!modal||!texto||!btnAceptar||!btnCancelar){
            const respuesta=(window.nativeDialogs?.confirm||window.confirm).call(window,mensaje);
            restaurarTutorial();
            resolve(respuesta);
            return;
          }
          texto.textContent=mensaje;
          modal.style.display='flex';
          modal.setAttribute('aria-hidden','false');
          marcarModalInteractiva(true, modal);
          btnCancelar.focus();
          const cerrar=(respuesta)=>{
            modal.style.display='none';
            modal.setAttribute('aria-hidden','true');
            marcarModalInteractiva(false, modal);
            btnAceptar.onclick=null;
            btnCancelar.onclick=null;
            modal.removeEventListener('click', manejarFondo);
            restaurarTutorial();
            resolve(respuesta);
          };
          btnCancelar.onclick=()=>cerrar(false);
          btnAceptar.onclick=()=>cerrar(true);
          function manejarFondo(e){ if(e.target===modal){ cerrar(false); } }
          modal.addEventListener('click', manejarFondo);
        });
      }

      function mostrarAlertaModal(mensaje, opciones={}){
        return new Promise(resolve=>{
          const modal=document.getElementById('modal-alert');
          const texto=document.getElementById('modal-alert-text');
          const titulo=document.getElementById('modal-alert-title');
          const btnAceptar=document.getElementById('modal-alert-accept');
          const restaurarTutorial=pausarTutorialTemporal();
          if(!modal||!texto||!btnAceptar){
            alert(mensaje);
            restaurarTutorial();
            resolve();
            return;
          }
          if(titulo){
            titulo.textContent=opciones.titulo||'Aviso';
          }
          texto.textContent=mensaje;
          modal.style.display='flex';
          modal.setAttribute('aria-hidden','false');
          marcarModalInteractiva(true, modal);
          btnAceptar.focus();
          const cerrar=()=>{
            modal.style.display='none';
            modal.setAttribute('aria-hidden','true');
            marcarModalInteractiva(false, modal);
            btnAceptar.onclick=null;
            modal.removeEventListener('click', manejarFondo);
            restaurarTutorial();
            resolve();
          };
          btnAceptar.onclick=cerrar;
          function manejarFondo(e){ if(e.target===modal){ cerrar(); } }
          modal.addEventListener('click', manejarFondo);
        });
      }

      function mostrarDetalle(t){
        const ref=t.referencia||'';
        const fs=formatearFecha(t.fechasolicitud||'');
        const hs=formatearHora(t.horasolicitud||'');
        const fg=formatearFecha(t.fechagestion||'');
        const hg=formatearHora(t.horagestion||'');
        const cont=document.querySelector('#modal-detalle .contenido');
        if(t.tipotrans==='premio' || t.tipotrans==='pago'){
          const etiqueta=t.tipotrans==='pago'?'PAGO':'PREMIO';
          cont.innerHTML=`<div style="color:#1b5e20;font-weight:bold;">Referencia: ${etiqueta}</div>`+
          `<div style="color:green;">Fecha de gestión: ${fg}</div>`+
          `<div style="color:green;">Hora de gestión: ${hg}</div>`+
          `<button id="modal-ok">Aceptar</button>`;
        }else{
          cont.innerHTML=`<div style="color:#00008B;">Referencia: ${ref}</div>`+
          `<div style="color:orange;">Fecha de solicitud: ${fs}</div>`+
          `<div style="color:orange;">Hora de solicitud: ${hs}</div>`+
          `<div style="color:green;">Fecha de gestión: ${fg}</div>`+
          `<div style="color:green;">Hora de gestión: ${hg}</div>`+
          `<button id="modal-ok">Aceptar</button>`;
        }
        const modal=document.getElementById('modal-detalle');
        const restaurarTutorial=pausarTutorialTemporal();
        modal.style.display='flex';
        modal.setAttribute('aria-hidden','false');
        marcarModalInteractiva(true);
        document.getElementById('modal-ok').addEventListener('click',()=>{
          modal.style.display='none';
          modal.setAttribute('aria-hidden','true');
          marcarModalInteractiva(false);
          restaurarTutorial();
        },{once:true});
      }

      function mostrarDetalleMonto(t){
        const solicitado=t.tipotrans==='retiro'?parseFloat(t.MontoSolicitado||t.Monto):parseFloat(t.Monto);
        const cartonesGratisNum=Number(t.cartonesGratis)||0;
        const esPremioCartones=(t.tipotrans==='premio') && cartonesGratisNum>0 && (Number(t.Monto)||0)===cartonesGratisNum;
        const comB=t.tipotrans==='retiro'?solicitado*porcentajeRetiro/100:0;
        const comG=t.tipotrans==='retiro'?solicitado*porcentajeAdministra/100:0;
        const total=parseFloat(t.Monto);
        const cont=document.querySelector('#modal-detalle .contenido');
        if(esPremioCartones){
          cont.innerHTML=
            `<div style="font-weight:bold;background:#6a1b9a;color:#fff;padding:8px;border-radius:8px;">Cartones gratis ganados: ${cartonesGratisNum}</div>`+
            `<button id='modal-ok'>Aceptar</button>`;
        }else
        if(t.tipotrans==='premio' || t.tipotrans==='pago'){
          cont.innerHTML=
            `<div style="font-weight:bold;color:#1b5e20;">Total recibido: ${total.toFixed(2)}</div>`+
            `<button id='modal-ok'>Aceptar</button>`;
        }else{
          cont.innerHTML=
            `<div style="font-weight:bold;color:purple;">Monto solicitado: ${solicitado.toFixed(2)}</div>`+
            `<div style="color:orange;">Comisión Bancaria: ${comB.toFixed(2)}</div>`+
            `<div style="color:orange;">Comisión Gestión: ${comG.toFixed(2)}</div>`+
            `<div style="font-weight:bold;color:darkgreen;">Total recibido: ${total.toFixed(2)}</div>`+
            `<button id='modal-ok'>Aceptar</button>`;
        }
        const modal=document.getElementById('modal-detalle');
        const restaurarTutorial=pausarTutorialTemporal();
        modal.style.display='flex';
        modal.setAttribute('aria-hidden','false');
        marcarModalInteractiva(true);
        document.getElementById('modal-ok').addEventListener('click',()=>{
          modal.style.display='none';
          modal.setAttribute('aria-hidden','true');
          marcarModalInteractiva(false);
          restaurarTutorial();
        },{once:true});
      }

      document.getElementById('filtro-tipo').addEventListener('change',filtrarTransacciones);
      document.getElementById('filtro-monto').addEventListener('input',filtrarTransacciones);
    document.getElementById('filtro-fecha').addEventListener('change',filtrarTransacciones);
    document.getElementById('filtro-estado').addEventListener('change',filtrarTransacciones);

    async function validarDatosBancarios(){
      const user=auth.currentUser;
      const doc=await db.collection('Billetera').doc(user.email).get();
      const d=doc.data()||{};
      if(d.banco && d.cuenta && d.cedula && d.pagomovil && d.tipoCuenta){
        return true;
      }
      await mostrarAlertaModal('Antes de solicitar una Recarga o Retiro debes tener todos tus datos bancarios registrados');
      const toggle=document.getElementById('toggle-datos');
      toggle.checked=true;
      document.getElementById('datos-content').style.display='block';
      if(!d.banco){
        document.getElementById('banco').focus();
      } else if(!d.cuenta){
        const cuentaToggle=document.getElementById('cuenta-toggle');
        cuentaToggle.checked=true;
        actualizarEstadoCuentaOpcional(true);
        document.getElementById('cuenta').focus();
      } else if(!d.cedula){
        document.getElementById('cedula').focus();
      } else if(!d.pagomovil){
        document.getElementById('pagomovil').focus();
      } else if(!d.tipoCuenta){
        const cuentaToggle=document.getElementById('cuenta-toggle');
        cuentaToggle.checked=true;
        actualizarEstadoCuentaOpcional(true);
        document.querySelector('input[name="tipo-cuenta"]').focus();
      }
      return false;
    }

    function limpiarCamposTransaccion(tipo){
      if(tipo==='recarga'){
        document.getElementById('banco-deposito').selectedIndex=0;
        document.getElementById('monto-deposito').value='';
        document.getElementById('referencia').value='';
        document.getElementById('comentario-deposito').value='';
      }else if(tipo==='retiro'){
        document.getElementById('monto-retiro').value='';
        document.getElementById('comentario-retiro').value='';
        document.getElementById('monto-retiro-neto').value='';
      }
    }

    function actualizarMontoNeto(){
      const monto=parseFloat(document.getElementById('monto-retiro').value)||0;
      const neto=monto - (monto*porcentajeRetiro/100) - (monto*porcentajeAdministra/100);
      document.getElementById('monto-retiro-neto').value=neto>0?neto.toFixed(2):'';
    }

    document.getElementById('monto-retiro').addEventListener('input',actualizarMontoNeto);

    document.getElementById('btn-depositar').addEventListener('click', async () => {
      if(!await validarDatosBancarios()) return;
      await initServerTime();
      const user = auth.currentUser;
      const banco=document.getElementById('banco-deposito').value;
      if(!banco){await mostrarAlertaModal('Seleccione el banco donde transferiste');document.getElementById('banco-deposito').focus();return;}
      const montoStr=document.getElementById('monto-deposito').value.trim();
      const monto=parseFloat(montoStr);
      if(!montoStr || isNaN(monto) || monto<=0){await mostrarAlertaModal('Ingrese un monto válido');document.getElementById('monto-deposito').focus();return;}
      const ref=document.getElementById('referencia').value.trim();
      if(!/^[0-9]{5}$/.test(ref)){await mostrarAlertaModal('Ingrese la referencia de 5 dígitos');document.getElementById('referencia').focus();return;}
      const data = {
        tipotrans:'recarga',
        bancoreceptor:banco,
        Monto:monto,
        referencia:ref,
        comentario: document.getElementById('comentario-deposito').value.trim(),
        estado:'PENDIENTE',
        IDbilletera: user.email,
        fechasolicitud: fechaActual(),
        horasolicitud: horaActual(),
        usuariogestor:'',
        rolusuario:'',
        fechagestion:'',
        horagestion:'',
        nota:''
      };
      const confirmar = await mostrarConfirmacionModal(`¿Confirmas la solicitud de recarga por ${monto.toFixed(2)}?`);
      if(!confirmar){ return; }
      await db.collection('transacciones').add(data);
      await mostrarAlertaModal('Bien, recibimos tu solicitud, una vez verificado el pago se recargará tu billetera, serás dirigido a tu WhatsApp para poder enviar el mensaje de solicitud');
      await notificarSolicitudWhatsapp('recarga',{
        banco:banco,
        monto:monto,
        referencia:ref,
        comentario:data.comentario
      });
      limpiarCamposTransaccion('recarga');
      suscribirTransaccionesUsuario();
    });

    async function ejecutarRetiro(monto,montoFinal, comentario){
      const user=auth.currentUser;
      await initServerTime();
      const billeteraRef=db.collection('Billetera').doc(user.email);
      const transaccionRef=db.collection('transacciones').doc();
      const data={
        tipotrans:'retiro',
        bancoreceptor:'',
        MontoSolicitado:monto,
        Monto:montoFinal,
        referencia:'',
        comentario:comentario,
        estado:'PENDIENTE',
        IDbilletera:user.email,
        fechasolicitud:fechaActual(),
        horasolicitud:horaActual(),
        usuariogestor:'',
        rolusuario:'',
        fechagestion:'',
        horagestion:'',
        nota:''
      };
      let billeteraData=null;
      try{
        await db.runTransaction(async tx=>{
          const billeteraSnap=await tx.get(billeteraRef);
          billeteraData=billeteraSnap.exists?(billeteraSnap.data()||{}):{};
          const bancoSeleccionado=(billeteraData.banco||'').toString();
          const creditosActual=toNumberSafe(billeteraData.creditos,0);
          const transitoActual=Math.max(0,toNumberSafe(billeteraData.creditostransito,0));
          const disponibles=Math.max(0,creditosActual-transitoActual);
          if(monto>disponibles){
            throw new Error('CREDITOS_INSUFICIENTES');
          }
          const nuevoTransito=transitoActual+monto;
          if(!data.bancoreceptor){
            data.bancoreceptor=bancoSeleccionado;
          }
          tx.set(billeteraRef,{creditostransito:nuevoTransito},{merge:true});
          tx.set(transaccionRef,data);
        });
      }catch(error){
        if(error?.message==='CREDITOS_INSUFICIENTES'){
          throw new Error('CREDITOS_INSUFICIENTES');
        }
        console.error('No se pudo registrar el retiro',error);
        throw error;
      }
      await refrescarResumenBilletera();
      await mostrarAlertaModal('Solicitud enviada, una vez validada se transferirá a tu pago móvil, serás dirigido a tu WhatsApp para poder enviar el mensaje de solicitud');
      limpiarCamposTransaccion('retiro');
      suscribirTransaccionesUsuario();
      return { data, billetera: billeteraData };
    }

    document.getElementById('btn-retirar').addEventListener('click', async () => {
      if(!await validarDatosBancarios()) return;
      const montoStr=document.getElementById('monto-retiro').value.trim();
      const monto=parseFloat(montoStr);
      if(!montoStr || isNaN(monto) || monto<=0){await mostrarAlertaModal('Ingrese un monto válido');document.getElementById('monto-retiro').focus();return;}
      if(monto>creditosDisponibles){ await mostrarAlertaModal(`El monto supera los créditos disponibles (${formatearMontoPantalla(creditosDisponibles)})`); return; }
      const montoFinal=monto - (monto*porcentajeRetiro/100) - (monto*porcentajeAdministra/100);
      document.getElementById('monto-retiro-neto').value = montoFinal>0 ? montoFinal.toFixed(2) : '';
      const comentarioRetiro=document.getElementById('comentario-retiro').value.trim();
      const continuar=await mostrarConfirmacionModal(`¿Confirmas la solicitud de retiro por ${montoFinal.toFixed(2)}?`);
      if(!continuar){ return; }
      const restaurarTutorial=pausarTutorialTemporal();
      try{
        const resultado=await ejecutarRetiro(monto,montoFinal, comentarioRetiro);
        await notificarSolicitudWhatsapp('retiro',{
          montoSolicitado:monto,
          montoNeto:montoFinal,
          comentario:comentarioRetiro,
          banco:resultado?.billetera?.banco||resultado?.data?.bancoreceptor||'',
          pagomovil:resultado?.billetera?.pagomovil||'',
          cuenta:resultado?.billetera?.cuenta||''
        });
      }catch(error){
        if(error?.message==='CREDITOS_INSUFICIENTES'){
          await refrescarResumenBilletera();
          await mostrarAlertaModal('El saldo disponible cambió. Inténtalo nuevamente.');
        }else{
          await mostrarAlertaModal('No se pudo registrar la solicitud de retiro. Inténtalo nuevamente.');
        }
      }finally{
        restaurarTutorial();
      }
    });

    document.getElementById('volver-btn').addEventListener('click',()=>{
      window.location.href='player.html';
    });

    </script>
    <script>
      document.addEventListener('DOMContentLoaded',()=>{
      const toggle=document.getElementById('toggle-datos');
      const datos=document.getElementById('datos-content');
      const transDiv=document.getElementById('transacciones-content');
      const btnRecargas=document.getElementById('tab-depositar');
      const btnRetiros=document.getElementById('tab-retirar');
      const seccionRecargas=document.getElementById('depositar');
      const seccionRetiros=document.getElementById('retirar');
      const tablaBancos=document.getElementById('tabla-bancos');
      const tituloBancos=document.getElementById('titulo-bancos');

      mostrarControlesTutorial();

      function actualizarVisibilidad(){
        datos.style.display=toggle.checked?'block':'none';
      }

      function activarEnfasis(tab){
        aplicarEnfasisPestana(tab, true);
      }

      function desactivarEnfasis(tab){
        aplicarEnfasisPestana(tab, false);
      }

      if(seccionRecargas){
        seccionRecargas.addEventListener('focusin',()=>activarEnfasis('recargas'));
        seccionRecargas.addEventListener('focusout',()=>{
          if(!seccionRecargas.contains(document.activeElement)){
            desactivarEnfasis('recargas');
          }
        });
      }

      if(seccionRetiros){
        seccionRetiros.addEventListener('focusin',()=>activarEnfasis('retiros'));
        seccionRetiros.addEventListener('focusout',()=>{
          if(!seccionRetiros.contains(document.activeElement)){
            desactivarEnfasis('retiros');
          }
        });
      }

      if(tablaBancos && tituloBancos){
        const activarTitulo=()=>tituloBancos.classList.add('resaltado');
        const desactivarTitulo=()=>tituloBancos.classList.remove('resaltado');
        tablaBancos.addEventListener('focusin',activarTitulo);
        tablaBancos.addEventListener('focusout',()=>{
          if(!tablaBancos.contains(document.activeElement)){
            desactivarTitulo();
          }
        });
      }

      toggle.addEventListener('change',actualizarVisibilidad);
      let debeAbrirDatos=false;
      try{
        if(sessionStorage.getItem('abrirDatosBancarios')==='1'){
          debeAbrirDatos=true;
          sessionStorage.removeItem('abrirDatosBancarios');
        }
      }catch(error){
        console.warn('No se pudo verificar la instrucción para abrir los datos bancarios',error);
      }
      if(debeAbrirDatos){
        toggle.checked=true;
      }
      actualizarVisibilidad();
      transDiv.style.display='block';
      if(debeAbrirDatos){
        setTimeout(()=>{
          const primerCampo=document.getElementById('banco');
          if(primerCampo){
            primerCampo.focus();
          }
        },0);
      }
    });
  </script>
