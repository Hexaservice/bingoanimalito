<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cantar Sorteos (depuración)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
    .panel { max-width: 960px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    h1 { margin-top: 0; }
    .row { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 8px; margin: 12px 0; }
    button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #f2f2f2; font-weight: 600; }
    .muted { color: #555; }
    .box { border: 1px dashed #bbb; border-radius: 8px; padding: 10px; min-height: 80px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Cantar Sorteos</h1>
    <p class="muted">Modo depuración: se removió la lógica operativa del flujo de sorteos en esta pantalla y se mantuvieron únicamente elementos HTML base.</p>

    <div class="row">
      <button id="salir-btn" type="button" onclick="window.location.href='admin.html'">Salir</button>
      <button id="sorteo-btn" type="button" disabled>Sorteo</button>
      <button id="estado-btn" type="button" disabled>Estado</button>
      <button id="sellar-btn" type="button" disabled>Sellar</button>
      <button id="publicar-btn" type="button" disabled>Publicar PDF</button>
      <button id="jugar-btn" type="button" disabled>Pasar a Jugando</button>
      <button id="finalizar-btn" type="button" disabled>Finalizar</button>
    </div>

    <h2>Paneles conservados (solo estructura)</h2>
    <div class="row">
      <section id="detalle-container" class="box">Detalle del sorteo</section>
      <section id="premios-container" class="box">Premios</section>
      <section id="cartones-container" class="box">Cartones</section>
      <section id="ganadores-container" class="box">Ganadores</section>
    </div>

    <h2>Registro visual</h2>
    <section id="log-container" class="box">Sin lógica JS asociada.</section>
  </div>
</body>
</html>
