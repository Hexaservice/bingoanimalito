<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin - Bingo Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
                        url('img/fondo-dinero-porcentage.jpg');
      background-repeat: repeat;
      background-size: auto;
      background-position: 0 0, 0 0;
      animation: fondo-movimiento 120s linear infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      font-family: 'Bangers', cursive;
      margin: 0;
    }
    @keyframes fondo-movimiento {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 0 0, -600px 600px;
      }
    }

    .menu-btn {
      width: 250px;
      height: 60px;
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      background: rgba(0, 170, 255, 0.8);
      color: white;
      border: 4px solid #FFD700;
      border-radius: 10px;
      text-shadow: 2px 2px 4px #000;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      margin: 5px;
    }
    .view {
      position: relative;
      width: 100%;
    }
    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }
    #logo-bingo {
      width: 250px;
      max-width: 80vw;
      height: auto;
      margin-bottom: 15px;
    }
    #session-info {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      font-size: 0.7rem;
    }
    #user-data {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      margin-right: 5px;
    }
    #user-name, #user-email {
      font-family: Calibri, Arial, sans-serif;
      color: #333;
      cursor: pointer;
    }


    #user-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    #logout-link {
      font-family: Calibri, Arial, sans-serif;
      margin-left: 5px;
      font-size: 0.7rem;
      color: #007bff;
      text-decoration: underline;
    }

    .back-btn {
      position: fixed;
      top: 5px;
      left: 5px;
      width: 120px;
      height: 40px;
      background: orange;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:5px;
    }
  </style>
  <link rel="stylesheet" href="css/desktopFrame.css">
</head>
<body>
  <img id="logo-bingo" src="img/Logo-BingOnline-nuevo500p.png" alt="logo" />
  <h2>Menú Superadmin</h2>
  <div id="session-info">
    <div id="user-data">
      <div id="user-name"></div>
      <div id="user-email"></div>
    </div>
    <img id="user-pic" referrerpolicy="no-referrer" crossorigin="anonymous" src="" alt="Usuario" />
    <a href="#" id="logout-link">Cerrar sesión</a>
  </div>
  <div id="main-menu">
    <button id="acceder-usuario-btn" class="menu-btn">Acceder como Usuario</button>
    <button id="gestionar-usuarios-btn" class="menu-btn">Gestionar Usuarios</button>
    <button id="reportes-btn" class="menu-btn">Reportes Generales</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-auth-compat.js"></script>
  <script src="js/logoSwitcher.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/notificationCenter.js"></script>
  <script>
  ensureAuth('Superadmin');
  async function intentarAbrirParametros(){
    try{
      const verificacion = await verificarRolFuerte('Superadmin', { forceRefresh: true });
      if(!verificacion.ok){
        alert('No tienes claims de Superadmin vigentes. Vuelve a iniciar sesión o contacta al administrador del sistema.');
        window.location.href='super.html';
        return;
      }

      await reautenticarConPopup();
    }catch(error){
      console.error('No fue posible completar la autorización fuerte para Parámetros', error);
      alert('No fue posible completar la reautenticación de Firebase. Intenta nuevamente.');
      return;
    }

    window.location.href='parametros.html';
  }
  document.getElementById("acceder-usuario-btn").addEventListener("click",()=>{window.location.href="accederusuario.html";});
  document.getElementById("gestionar-usuarios-btn").addEventListener("click",()=>{window.location.href="gestionarusuarios.html";});
  document.getElementById('reportes-btn').addEventListener('click',()=>{window.location.href='reportes.html';});
  document.getElementById('user-name').addEventListener('click',intentarAbrirParametros);
  document.getElementById('user-email').addEventListener('click',intentarAbrirParametros);
  </script>
  <script src="js/backNavigation.js"></script>
</body>
</html>
