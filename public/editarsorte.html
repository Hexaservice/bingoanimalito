<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">
  <link rel="icon" type="image/x-icon" sizes="32x32" href="img/favicon-32x32.ico">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Sorteo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)),
                  url('https://img.freepik.com/vectores-premium/padrao-sem-costura-com-simbolos-de-dolar-e-porcentagem_637741-777.jpg');
      background-repeat: repeat;
      background-size: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      text-align: center;
      font-family: 'Bangers', cursive;
      padding-top: 5px;
      margin: 0;
    }
    .menu-btn {
      width: 250px;
      height: 60px;
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      background: rgba(0, 170, 255, 0.8);
      color: white;
      border: 4px solid #FFD700;
      border-radius: 10px;
      text-shadow: 2px 2px 4px #000;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
      margin: 5px;
    }
    .menu-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }
    .action-btn{
      font-family:'Bangers',cursive;
      background:linear-gradient(#0a8800,#ffffff);
      color:white;
      border:3px solid #FFD700;
      border-radius:8px;
      text-shadow:2px 2px 4px #000;
      cursor:pointer;
    }
    .back-btn {
      position: fixed;
      top: 5px;
      left: 5px;
      width: 120px;
      height: 40px;
      background: orange;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:5px;
    }
    input, select {
      font-size:1rem;
      padding:5px;
      text-align:center;
      border-radius:5px;
      border:1px solid #ccc;
      width:250px;
      display:block;
      margin:3px auto;
      color:black;
      box-sizing:border-box;
    }
    .row{display:flex;justify-content:center;gap:5px;width:calc(100% - 12px);margin:3px 6px;}
    .row input{flex:1;width:100%;}
    .premio-row{display:grid;grid-template-columns:1.15fr 0.85fr 1.15fr 0.85fr 1.15fr 0.85fr;align-items:center;width:calc(100% - 12px);gap:5px;font-weight:bold;}
    .premio-row input{margin:0;text-align:center;font-weight:bold;width:100%;min-width:0;}
    .premio-row span{margin:0;text-align:center;font-weight:bold;}
    .porcentaje-forma{color:green;border:2px solid #006400;}
    .porcentaje-forma::placeholder,
    .cartones-forma::placeholder,
    .cartones-forma-2::placeholder{font-size:0.78rem;}
    .porcentaje-restante{color:#006400;font-size:1.2rem;}
    .cartones-forma{border:2px solid purple;}
    .cartones-total{color:purple;font-size:1.2rem;}
    .cartones-forma-2{border:2px solid #ff8c00;}
    .cartones-total-2{color:#ff8c00;font-size:1.2rem;}
    #nombre-sorteo{font-weight:bold;color:purple;}
    .nombre-sorteo-row{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 12px);margin:4px 6px;}
    .nombre-sorteo-row #nombre-sorteo{flex:1;margin:0;min-width:0;}
    .loterias-btn{font-family:'Bangers',cursive;font-size:0.9rem;padding:6px 12px;border-radius:8px;border:2px solid #6f42c1;background:linear-gradient(#6f42c1,#ffffff);color:#fff;text-shadow:1px 1px 2px #000;cursor:pointer;}
    #loterias-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:2600;padding:16px;box-sizing:border-box;}
    #loterias-modal.visible{display:flex;}
    .loterias-dialog{background:#fff;border-radius:16px;padding:16px;width:min(560px,95vw);max-height:88vh;display:flex;flex-direction:column;gap:12px;position:relative;}
    .loterias-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:10px;overflow-y:auto;max-height:58vh;padding:2px;}
    .loteria-item{border:2px solid #d2d2d2;border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
    .loteria-item.selected{border-color:#1e90ff;box-shadow:0 0 0 2px rgba(30,144,255,0.25);}
    .loteria-item img{width:54px;height:54px;object-fit:cover;border-radius:8px;background:#f4f4f4;}
    .loteria-item .check-wrap{display:flex;align-items:center;gap:4px;font-family:'Poppins',sans-serif;font-size:0.68rem;}
    .loterias-empty{font-family:'Poppins',sans-serif;font-size:0.9rem;color:#555;text-align:center;padding:10px;}
    .toggle-group{display:flex;justify-content:center;gap:5px;margin:3px 0;}
    .toggle-group button{flex:0 0 auto;width:95px;padding:5px 10px;border-radius:20px;border:1px solid #ccc;font-family:'Bangers',cursive;font-size:1rem;cursor:pointer;background:#808080;color:#fff;text-shadow:1px 1px 2px #333;}
    .toggle-group .premio-inicial-input{flex:1;max-width:160px;margin:0;width:auto;}
    .toggle-group button.active{filter:brightness(1.2);text-shadow:1px 1px 2px #000;}
    #tipo-sorteo-group button.active[data-value="Sorteo Especial"]{background:linear-gradient(#ff8c00,#ffd9a5);}
    #tipo-sorteo-group button.active[data-value="Sorteo Diario"]{background:linear-gradient(#009900,#66ff66);}
    #estado-group button.active[data-value="Activo"]{background:linear-gradient(#00a000,#ffffff);}
    #estado-group button.active[data-value="Inactivo"]{background:linear-gradient(#ff0000,#ffffff);}
    #estado-group button.active[data-value="Archivado"]{background:linear-gradient(#8b4513,#ffffff);}
    .tabs{width:calc(100% - 30px);max-width:600px;margin:5px auto;}
    .tab-buttons{display:flex;justify-content:center;}
    .tab-buttons button{flex:1;padding:6px 0;margin:0 2px;font-family:'Bangers',cursive;font-size:1rem;border:1px solid #333;border-bottom:none;border-radius:10px 10px 0 0;color:white;cursor:pointer;background:#808080;text-shadow:1px 1px 2px #333;}
    .tab-buttons button.active{filter:brightness(1.1);position:relative;top:1px;text-shadow:1px 1px 2px #000;}
    .tab-content{display:none;border:1px solid #333;border-radius:0 0 20px 20px;padding:10px;position:relative;overflow:hidden;gap:5px;perspective:1000px;}
    .tab-content.active{display:flex;flex-direction:column;align-items:center;}
    .tab-content>input,
    .tab-content .row,
    .tab-content .premio-row,
    .tab-content .ver-imagen{width:calc(100% - 12px);margin:2px 6px;}
    .tab-content .imagen-wrapper{width:calc(100% - 12px);margin:2px 6px 0 6px;}
    .forma-nombre-row{display:flex;align-items:center;gap:6px;width:calc(100% - 12px);margin:2px 6px;padding:2px 6px;background:rgba(255,255,255,0.7);border-radius:10px;box-sizing:border-box;}
    .forma-nombre-row .nombre-forma{flex:1;min-width:0;}
    .fx-button{font-family:'Bangers',cursive;font-size:0.9rem;letter-spacing:1px;padding:4px 10px;border-radius:10px;border:1px solid #888;background:linear-gradient(var(--fx-color,#4caf50),#ffffff);color:#fff;text-shadow:2px 2px 3px #000;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.2);min-width:56px;}
    .fx-button:active{transform:scale(0.95);}
    .guardar-forma-btn{border:none;background:none;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.4rem;color:#333;line-height:1;text-shadow:1px 1px 2px rgba(0,0,0,0.4);}
    .guardar-forma-btn span{filter:none;}
    .guardar-forma-btn:active{transform:scale(0.9);}
    .tab-buttons button.active[data-tab="forma1"], .forma-item1{--forma-color:#90ee90;background:linear-gradient(#90ee90,#ffffff);}
    .tab-buttons button.active[data-tab="forma2"], .forma-item2{--forma-color:#fffacd;background:linear-gradient(#fffacd,#ffffff);}
    .tab-buttons button.active[data-tab="forma3"], .forma-item3{--forma-color:#add8e6;background:linear-gradient(#add8e6,#ffffff);}
    .tab-buttons button.active[data-tab="forma4"], .forma-item4{--forma-color:#d8b0ff;background:linear-gradient(#d8b0ff,#ffffff);}
    .tab-buttons button.active[data-tab="forma5"], .forma-item5{--forma-color:#ffcc99;background:linear-gradient(#ffcc99,#ffffff);}
    .forma-label{position:absolute;left:-35px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;text-orientation:upright;font-weight:bold;font-size:0.8rem;}
    .carton-wrapper{position:relative;transform-style:preserve-3d;transition:transform 0.6s;border-radius:16px;padding:6px;background:linear-gradient(green,yellow);box-shadow:0 0 15px rgba(0,0,0,0.5);margin:8px auto;}
    .carton-wrapper.flipped .carton{pointer-events:none;}
    .carton-wrapper.flipped .carton-back{pointer-events:auto;}
    .carton{margin:0;border-collapse:separate;border-spacing:0;background:linear-gradient(#ffffff,#cccccc);border-radius:10px;backface-visibility:hidden;-webkit-backface-visibility:hidden;table-layout:fixed;box-sizing:border-box;}
    .carton th,.carton td{background:transparent;border:2px solid gray;width:60px;height:60px;aspect-ratio:1/1;text-align:center;font-weight:bold;padding:0;margin:0;box-sizing:border-box;backface-visibility:hidden;-webkit-backface-visibility:hidden;font-family:'Poppins',sans-serif;}
    .carton th{font-size:2.5rem;color:#ff6600;background:radial-gradient(circle,#ffffff,#ffffff 60%,#00aa00);text-shadow:2px 2px 0 #000;}
    .carton td{cursor:pointer;font-size:1.8rem;text-shadow:0 0 3px green;}
    .tab-content .carton td.selected:not(.free){background:radial-gradient(circle,#ffffff,#ffffff 60%,var(--forma-color,#ffff00));}
    .carton td.selected .star{color:orange;}
    .carton td.free{background:radial-gradient(circle,#ffff00,#ffffff);display:flex;align-items:center;justify-content:center;}
    .carton td.free img{width:80%;height:80%;object-fit:contain;}
    .carton td .star{display:inline-block;animation:spinStar 10s linear infinite;}
    @keyframes spinStar{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .carton-back{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:10px;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(orange,white);display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .carton-back .back-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .carton-back .back-content img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:auto;object-fit:contain;opacity:0.7;pointer-events:none;z-index:0;}
    .carton-back .back-info{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;width:100%;z-index:1;}
    .back-nombre{font-family:'Bangers',cursive;font-size:1.5rem;color:purple;text-shadow:0 0 5px #fff;font-weight:bold;animation:pulse 1s infinite;}
    .back-tipo{font-family:'Bangers',cursive;font-size:1.3rem;text-shadow:0 0 5px #fff;font-weight:bold;animation:pulse 1s infinite;}
    .back-fecha-hora{display:flex;gap:20px;font-family:'Bangers',cursive;font-size:1.2rem;color:purple;text-shadow:0 0 5px #fff;font-weight:bold;}
    .imagen-wrapper{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;}
    .imagen-wrapper input{flex:1;min-width:120px;font-size:0.8rem;}
    .imagen-wrapper button{padding:3px 6px;font-size:0.8rem;}
    .imagen-wrapper .ver-foto-btn{width:30px;height:30px;border:1px solid #ccc;border-radius:5px;display:flex;align-items:center;justify-content:center;background:#fff;}
    .imagen-wrapper .ver-foto-btn img{width:100%;height:100%;object-fit:contain;}
    .ver-imagen{display:none;margin-top:2px;font-size:0.9rem;color:#007bff;text-decoration:underline;cursor:pointer;}
    #formas-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);align-items:center;justify-content:center;z-index:2000;padding:16px;box-sizing:border-box;}
    #formas-modal.visible{display:flex;}
    #formas-modal .formas-contenido{background:rgba(255,255,255,0.95);border-radius:18px;padding:clamp(16px,2vw,26px);width:min(1100px,95vw);max-height:90vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 12px 32px rgba(0,0,0,0.45);position:relative;overflow:hidden;}
    #formas-modal .formas-titulo{font-family:'Bangers',cursive;font-size:1.4rem;text-align:center;margin:0;color:#4b0082;text-shadow:0 0 6px #fff;}
    #formas-modal .cerrar-formas{position:absolute;top:10px;right:12px;font-size:1.6rem;cursor:pointer;background:none;border:none;color:#4b0082;text-shadow:1px 1px 2px #fff;}
    #loterias-modal .cerrar-loterias-modal{position:absolute;top:8px;right:10px;font-size:1.6rem;cursor:pointer;background:none;border:none;outline:none;box-shadow:none;color:#4b0082;text-shadow:1px 1px 2px #fff;padding:0;line-height:1;}
    #formas-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;flex:1;overflow-y:auto;padding-right:4px;align-content:flex-start;}
    .forma-miniatura{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px;border-radius:14px;background:linear-gradient(150deg,var(--forma-color,#90ee90),#ffffff);box-shadow:0 6px 16px rgba(0,0,0,0.25);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
    .forma-miniatura:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,0.3);}
    .forma-miniatura.selected{outline:3px solid #1e90ff;outline-offset:3px;}
    .mini-tabla-wrapper{background:rgba(255,255,255,0.9);padding:6px;border-radius:10px;box-shadow:inset 0 0 6px rgba(0,0,0,0.18);}
    .mini-forma{border-collapse:separate;border-spacing:1.5px;}
    .mini-forma td,.mini-forma th{width:18px;height:18px;text-align:center;border:1px solid rgba(0,0,0,0.2);border-radius:4px;font-size:0.55rem;font-weight:bold;font-family:'Poppins',sans-serif;color:#333;background:rgba(255,255,255,0.95);}
    .mini-forma th{font-size:0.65rem;color:#ff6600;background:radial-gradient(circle,#ffffff,#ffffff 60%,#00aa00);text-shadow:1px 1px 0 #000;}
    .mini-forma td.star{background:var(--forma-color,#90ee90);color:#fff;text-shadow:0 0 4px #000;}
    .mini-forma td.centro{background:#ffeb3b;color:#6b6b6b;}
    .mini-forma .mini-star{display:inline-block;font-size:0.7rem;text-shadow:0 0 4px rgba(0,0,0,0.4);}
    .mini-forma td.star .mini-star{color:#fff;}
    .mini-forma td.centro .mini-star{color:#6b6b6b;text-shadow:0 0 3px rgba(0,0,0,0.3);}
    .mini-nombre{font-size:0.6rem;font-family:'Poppins',sans-serif;text-transform:uppercase;text-align:center;color:#4b0082;letter-spacing:0.5px;}
    .formas-modal-acciones{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
    .formas-modal-acciones .action-btn{font-size:1.1rem;padding:8px 18px;}
    .formas-modal-acciones .editar-btn{background:linear-gradient(blue,#ffffff);}
    .formas-modal-acciones .eliminar-btn{background:linear-gradient(brown,#ffffff);width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
    .formas-empty{grid-column:1/-1;text-align:center;font-family:'Bangers',cursive;font-size:1.1rem;color:#4b0082;}
    body.modal-open{overflow:hidden;}
    .input-wrapper{display:flex;align-items:center;}
    .label-left{font-weight:bold;font-size:0.8rem;margin-right:3px;text-shadow:0 0 3px #fff;}
    .label-right{font-weight:bold;font-size:0.8rem;margin-left:3px;text-shadow:0 0 3px #fff;}
    #fecha-label{font-size:1rem;color:#4b0082;text-shadow:0 0 1px #fff,1px 1px 1px #000;}
    #fecha-sorteo{color:#4b0082;font-weight:bold;}
    #hora-label{font-size:1rem;color:purple;text-shadow:0 0 1px #fff,1px 1px 1px #000;}
    #hora-sorteo{color:purple;font-weight:bold;}
    #cierre-label{font-size:1rem;color:#ff8c00;text-shadow:0 0 1px #fff,1px 1px 1px #000;}
    #hora-cierre{color:#ff8c00;font-weight:bold;}
    #max-carton-gratis{width:40px;text-align:center;font-weight:bold;}
    #max-carton-gratis::placeholder{font-size:0.6rem;}
    #valor-label{font-size:1rem;color:#006400;text-shadow:0 0 1px #fff,1px 1px 1px #000;}
    #valor-carton{color:#006400;font-weight:bold;}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}
    .modal img{max-width:90%;max-height:90%;}
    .modal span{position:absolute;top:10px;right:20px;font-size:2rem;color:#fff;cursor:pointer;}
    #confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:2500;padding:16px;box-sizing:border-box;}
    #confirm-modal.visible{display:flex;}
    #confirm-modal .confirm-dialog{background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;box-shadow:0 10px 28px rgba(0,0,0,0.35);font-family:'Poppins',sans-serif;text-align:center;display:flex;flex-direction:column;gap:16px;}
    #confirm-modal .confirm-dialog p{margin:0;color:#333;font-weight:600;font-size:1rem;}
    #confirm-modal .confirm-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
    #confirm-modal .confirm-actions button{min-width:110px;padding:8px 16px;border-radius:8px;border:2px solid #333;font-family:'Bangers',cursive;font-size:1rem;cursor:pointer;color:#fff;text-shadow:1px 1px 2px #000;}
    #confirm-modal .confirm-actions .cancelar-btn{background:linear-gradient(#808080,#c0c0c0);}
    #confirm-modal .confirm-actions .aceptar-btn{background:linear-gradient(#0a8800,#ffffff);color:#fff;}
    @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
    @media (orientation:landscape){
      .row,.premio-row,.imagen-wrapper,.toggle-group,.tabs{width:90% !important;margin-left:auto;margin-right:auto;}
      .premio-row{grid-template-columns:2fr 1fr 2fr 1fr 2fr 1fr;}
    }
    @media (max-width:600px){
      body{align-items:stretch;padding:5px 20px;}
      .menu-btn,input,select,.row,.toggle-group,.imagen-wrapper,.tabs{width:100%;max-width:none;margin-left:0;margin-right:0;}
    }
    @media (orientation:portrait){
      #volver-btn{width:40px;}
      #volver-btn .label{display:none;}
    }

    #actualizar-sorteo-btn{
      font-family:'Bangers',cursive;
      font-size:1.2rem;
      background:#0a8800;
      color:white;
      border:3px solid #FFD700;
      border-radius:8px;
      text-shadow:2px 2px 4px #000;
      width:200px;
      cursor:pointer;
      margin:5px auto;
    }
  </style>
  <link rel="stylesheet" href="css/desktopFrame.css">
</head>
<body>
  <button id="volver-btn" class="menu-btn back-btn" data-compact-back="true"><span class="icon">&#9664;</span><span class="label">Volver</span></button>
  <h2 style="margin-top:0;">Editar Sorteo</h2>
  <div class="nombre-sorteo-row">
    <input id="nombre-sorteo" maxlength="70" placeholder="Nombre de sorteo">
    <button type="button" id="loterias-btn" class="loterias-btn">Loterías</button>
  </div>
  <div id="tipo-sorteo-group" class="toggle-group">
    <button data-value="Sorteo Especial">Especial</button>
    <button data-value="Sorteo Diario">Diario</button>
    <input id="premio-inicial" class="premio-inicial-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Premio Inicial">
  </div>
  <div class="row">
    <div class="input-wrapper"><span class="label-left" id="fecha-label">Fecha</span><input id="fecha-sorteo" type="date"></div>
    <div class="input-wrapper"><input id="hora-sorteo" type="time"><span class="label-right" id="hora-label">Hora</span></div>
  </div>
  <div class="row">
    <div class="input-wrapper"><span class="label-left" id="cierre-label">CIERRE</span><input id="hora-cierre" type="time" placeholder="Hora de cierre de jugadas"></div>
    <div class="input-wrapper"><input id="max-carton-gratis" type="number" min="0" max="99" placeholder="Max CG" style="width:40px;text-align:center;"></div>
    <div class="input-wrapper"><input id="valor-carton" type="number" placeholder="Valor del Cartón"><span class="label-right" id="valor-label">VALOR CARTÓN</span></div>
  </div>
  <div id="estado-group" class="toggle-group">
    <button data-value="Activo">Activo</button>
    <button data-value="Inactivo" class="active">Inactivo</button>
    <button data-value="Archivado">Archivado</button>
  </div>
  <div id="forms-container"></div>
  <div id="image-modal" class="modal"><span id="close-modal">&times;</span><img id="modal-img" src="" alt="premio"></div>
  <div id="formas-modal">
    <div class="formas-contenido" id="formas-contenido">
      <button type="button" class="cerrar-formas" id="cerrar-formas-modal">✖</button>

  function mostrarConfirmacion(mensaje){
    const modal=document.getElementById('confirm-modal');
    const mensajeEl=document.getElementById('confirm-message');
    const aceptarBtn=document.getElementById('confirm-accept-btn');
    const cancelarBtn=document.getElementById('confirm-cancel-btn');
    if(!modal||!mensajeEl||!aceptarBtn||!cancelarBtn){
      return Promise.resolve(window.confirm(mensaje));
    }
    return new Promise(resolve=>{
      const wasOpen=document.body.classList.contains('modal-open');
      mensajeEl.textContent=mensaje;
      modal.classList.add('visible');
      if(!wasOpen){
        document.body.classList.add('modal-open');
      }

      const cerrar=resultado=>{
        limpiar();
        modal.classList.remove('visible');
        if(!wasOpen){
          if(!document.getElementById('formas-modal')?.classList.contains('visible')){
            document.body.classList.remove('modal-open');
          }else{
            document.body.classList.add('modal-open');
          }
        }
        resolve(resultado);
      };

      const onAceptar=()=>cerrar(true);
      const onCancelar=()=>cerrar(false);
      const onBackdrop=e=>{if(e.target===modal) cerrar(false);};
      const onKey=e=>{
        if(e.key==='Escape'){cerrar(false);}else if(e.key==='Enter' && document.activeElement===aceptarBtn){cerrar(true);} 
      };
      function limpiar(){
        aceptarBtn.removeEventListener('click',onAceptar);
        cancelarBtn.removeEventListener('click',onCancelar);
        modal.removeEventListener('click',onBackdrop);
        document.removeEventListener('keydown',onKey);
      }

      aceptarBtn.focus({preventScroll:true});
      aceptarBtn.addEventListener('click',onAceptar);
      cancelarBtn.addEventListener('click',onCancelar);
      modal.addEventListener('click',onBackdrop);
      document.addEventListener('keydown',onKey);
    });
  }

  function setCookie(name,value){document.cookie=`${name}=${encodeURIComponent(value)};path=/;max-age=31536000`;}
  function getCookie(name){const m=document.cookie.match(new RegExp('(?:^|; )'+name+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}

  function saveState(){
    if(!cookieKey) return;

    const fecha=document.getElementById('fecha-sorteo').value;
    const hora=document.getElementById('hora-sorteo').value;
    const cierre=document.getElementById('hora-cierre').value;
    const maxcg=document.getElementById('max-carton-gratis').value;
    const valor=document.getElementById('valor-carton').value;
    const tipoBtn=document.querySelector('#tipo-sorteo-group button.active');
    const premioInicial=document.getElementById('premio-inicial').value;
    const estadoBtn=document.querySelector('#estado-group button.active');
    const data={
      nombre,tipo:tipoBtn?tipoBtn.dataset.value:'',fecha,hora,cierre,maxcg,valor,premioInicial,
      estado:estadoBtn?estadoBtn.dataset.value:'',
      loterias:Array.from(loteriasSeleccionadas),
      formas:[]
    };
    document.querySelectorAll('.tab-content').forEach(div=>{
      const f={
        nombre:div.querySelector('.nombre-forma').value.trim(),
        porcentaje:div.querySelector('.porcentaje-forma').value,
        cartones:div.querySelector('.cartones-forma').value,
        cartones2:div.querySelector('.cartones-forma-2').value,
        imagen:div.querySelector('.imagen-url').value,
        posiciones:[]
      };
      div.querySelectorAll('td.selected').forEach(td=>{
        const r=parseInt(td.dataset.row);const c=parseInt(td.dataset.col);
        if(!(r===2&&c===2)) f.posiciones.push({r,c});
      });
      data.formas.push(f);
    });
    setCookie(cookieKey,JSON.stringify(data));
  }

  function loadState(){
    if(!cookieKey) return;
    const raw=getCookie(cookieKey);
    if(!raw) return;
    try{
      const data=JSON.parse(raw);
      document.getElementById('nombre-sorteo').value=data.nombre||'';
      document.getElementById('fecha-sorteo').value=data.fecha||'';
      document.getElementById('hora-sorteo').value=data.hora||'';
      document.getElementById('hora-cierre').value=data.cierre||'';
      const maxcgValue=(data.maxcg===undefined||data.maxcg===null||data.maxcg==='')?'':data.maxcg;
      document.getElementById('max-carton-gratis').value=maxcgValue;
      document.getElementById('valor-carton').value=data.valor||'';
      document.getElementById('premio-inicial').value=data.premioInicial||'';
      if(data.tipo){
        document.querySelectorAll('#tipo-sorteo-group button').forEach(b=>b.classList.remove('active'));
        const tb=document.querySelector(`#tipo-sorteo-group button[data-value="${data.tipo}"]`);
        if(tb) tb.classList.add('active');
      }
      if(data.estado){
        document.querySelectorAll('#estado-group button').forEach(b=>b.classList.remove('active'));
        const eb=document.querySelector(`#estado-group button[data-value="${data.estado}"]`);
        if(eb) eb.classList.add('active');
      }
      loteriasSeleccionadas.clear();
      if(Array.isArray(data.loterias)){
        data.loterias.forEach(id=>loteriasSeleccionadas.add(String(id)));
      }
      const divs=document.querySelectorAll('.tab-content');
      data.formas&&data.formas.forEach((f,i)=>{
        const div=divs[i];
        if(!div) return;
        div.querySelector('.nombre-forma').value=f.nombre||'';
        div.querySelector('.porcentaje-forma').value=f.porcentaje||'';
        div.querySelector('.cartones-forma').value=f.cartones||'';
        div.querySelector('.cartones-forma-2').value=f.cartones2||'';
        div.querySelector('.imagen-url').value=f.imagen||'';
        if(f.imagen){
          const ver=div.querySelector('.ver-imagen');
          ver.style.display='block';
          ver.dataset.url=f.imagen;
          ver.href=f.imagen;
        }
          div.querySelectorAll('td').forEach(td=>{
            td.classList.remove('selected');
            td.innerHTML='';
            if(td.dataset.row==='2' && td.dataset.col==='2'){
              td.classList.add('free','selected');
              const img=document.createElement('img');
              img.src=LOGO_URL;
              img.alt='logo';
              img.style.width='100%';
              img.style.height='100%';
              img.style.objectFit='contain';
              td.appendChild(img);
            }
          });
          f.posiciones&&f.posiciones.forEach(p=>{
            const td=div.querySelector(`td[data-row="${p.r}"][data-col="${p.c}"]`);
            if(td){td.classList.add('selected');td.innerHTML='<span class="star">\u2605</span>';}
          });
        });
        actualizarTotales();
        refrescarBotonLoterias();
      }catch(e){console.error('loadState',e);}
    }

  const FALLBACK_IMAGEN_LOTERIA='img/android-chrome-192x192.png';

  function normalizarRutaImagen(valor){
    if(typeof valor!=='string') return '';
    const limpio=valor.trim();
    if(!limpio) return '';
    if(/^https?:\/\//i.test(limpio) || /^data:/i.test(limpio)) return limpio;
    if(limpio.startsWith('//')) return `https:${limpio}`;
    if(limpio.startsWith('/')) return limpio.slice(1);
    if(/^\.?\//.test(limpio)) return limpio.replace(/^\.?\//,'');
    return limpio;
  }

  function normalizarSlugLoteria(valor){
    const base=(typeof valor==='string'?valor:'').trim().toLowerCase();
    if(!base) return 'loteria';
    return base
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]+/g,'-')
      .replace(/^-+|-+$/g,'')||'loteria';
  }

  function resolverImagenLoteria(d){
    const slug=normalizarSlugLoteria(d?.nombre||d?.id||'loteria');
    const fallbackLoteria=`img/loterias/${slug}.png`;
    const miniatura=normalizarRutaImagen(d?.imagenMiniatura);
    const imagen=normalizarRutaImagen(d?.imagen);
    const logo=normalizarRutaImagen(d?.logo);
    const src=miniatura||imagen||logo||fallbackLoteria||FALLBACK_IMAGEN_LOTERIA;
    return {
      src,
      source:miniatura?'imagenMiniatura':(imagen?'imagen':(logo?'logo':'fallbackLoteria')),
      fallbackLoteria,
      fallbackFinal:FALLBACK_IMAGEN_LOTERIA
    };
  }

  function renderLoteriasGrid(){
    const grid=document.getElementById('loterias-grid');
    if(!grid) return;
    if(!loteriasActivas.length){
      grid.innerHTML='<div class="loterias-empty">No hay loterías activas disponibles.</div>';
      return;
    }
    const frag=document.createDocumentFragment();
    loteriasActivas.forEach(loteria=>{
      const item=document.createElement('div');
      item.className='loteria-item';
      item.dataset.id=loteria.id;
      if(loteriasSeleccionadas.has(loteria.id)) item.classList.add('selected');
      item.innerHTML=`<img src="${loteria.imagen}" alt="${loteria.nombre}"><div class="check-wrap"><input type="checkbox" ${loteriasSeleccionadas.has(loteria.id)?'checked':''}> <span>${loteria.nombre}</span></div>`;
      const imgEl=item.querySelector('img');
      if(imgEl){
        imgEl.onerror=()=>{
          if(loteria.source==='imagenMiniatura'){
            console.warn(`[loterias] imagenMiniatura inválida para id=${loteria.id}`);
          }
          const nextSrc=!loteria.fallbackIntentado?loteria.fallbackLoteria:loteria.fallbackFinal;
          if(imgEl.src.endsWith(nextSrc)) return;
          if(!loteria.fallbackIntentado){
            loteria.fallbackIntentado=true;
          }
          imgEl.src=nextSrc;
        };
      }
      const toggle=()=>{
        if(loteriasSeleccionadas.has(loteria.id)){
          loteriasSeleccionadas.delete(loteria.id);
        }else{
          loteriasSeleccionadas.add(loteria.id);
        }
        renderLoteriasGrid();
      };
      item.addEventListener('click',toggle);
      item.querySelector('input').addEventListener('click',e=>{e.stopPropagation();toggle();});
      frag.appendChild(item);
    });
    grid.innerHTML='';
    grid.appendChild(frag);
  }

  async function cargarLoteriasActivas(){
    if(loteriasActivas.length) return;
    const snap=await db.collection('loterias').get();
    loteriasActivas=snap.docs.map(doc=>{
      const d=doc.data()||{};
      const estado=(d.estado||'').toString().toLowerCase();
      const activa=estado==='activa'||estado==='activo'||d.activa===true||d.activo===true;
      const imagenResuelta=resolverImagenLoteria({...d,id:doc.id});
      return {
        id:doc.id,
        nombre:d.nombre||'Lotería',
        imagen:imagenResuelta.src,
        source:imagenResuelta.source,
        fallbackLoteria:imagenResuelta.fallbackLoteria,
        fallbackFinal:imagenResuelta.fallbackFinal,
        fallbackIntentado:false,
        activa
      };
    }).filter(item=>item.activa);
  }

    async function cargarDatos(){
    const doc=await db.collection('sorteos').doc(sorteoId).get();
    if(!doc.exists){alert('Sorteo no encontrado');window.location.href='gestionsorteos.html';return;}
    const d=doc.data();
    let est=d.estado||'';
    if(d.condicion==='ARCHIVADO') est='Archivado';
    premioInicialBase=Number(d.premioInicial||0) || 0;
    totalPremiosBase=Number(d.totalPremios||0) || 0;
    const data={nombre:d.nombre||'',tipo:d.tipo||'',fecha:d.fecha||'',hora:d.hora||'',cierre:d.horacierre||d.cierre||'',maxcg:(d.maxcartongratis??''),valor:d.valorCarton||'',premioInicial:d.premioInicial??'',estado:est,loterias:obtenerLoteriasAsignadas(d),formas:[]};
    const snap=await db.collection('formas').where('sorteoId','==',sorteoId).get();
    const arr=[];snap.forEach(s=>arr.push(s.data()));
    arr.sort((a,b)=>(a.idx||0)-(b.idx||0));
    arr.forEach(f=>{data.formas.push({nombre:f.nombre||'',porcentaje:f.porcentaje||'',cartones:f.cartonesGratis||'',cartones2:f.cartonesGratis2||'',imagen:f.premioImagen||'',posiciones:f.posiciones||[]});});
    setCookie(cookieKey,JSON.stringify(data));
  }

firebase.auth().onAuthStateChanged(u=>{
    if(u){
      cookieKey='editarsorteo_'+sorteoId+'_'+u.email.replace(/[^\w]/g,'_');

  function formatearHora(hora){
    if(!hora) return '';
    const [hh,mm]=hora.split(':');
    let h=parseInt(hh,10);
    const ampm=h>=12?'PM':'AM';
    h=h%12; if(h===0) h=12;
    return `${h}:${mm} ${ampm}`;
  }

  function formatearFecha(fecha){
    if(!fecha) return '';
    const [yy,mm,dd]=fecha.split('-');
    return `${dd}/${mm}/${yy}`;
  }

      horaSpan.textContent=hora?`HORA: ${formatearHora(hora)}`:'';

      fhDiv.style.display='none';

  function flipCard(wrapper){
    const flipped=wrapper.classList.contains('flipped');
    if(!flipped) updateCartonBack(wrapper);
    const start=flipped?180:0;
    const end=flipped?0:180;
    wrapper.animate([
      {transform:`rotateY(${start}deg) scale(1)`},
      {transform:`rotateY(${(start+end)/2}deg) scale(1.2)`},
      {transform:`rotateY(${end}deg) scale(1)`}
    ],{duration:600,easing:'ease-in-out'}).onfinish=()=>{
      wrapper.style.transform=`rotateY(${end}deg)`;
      wrapper.classList.toggle('flipped');
    };
  }

  function crearTabla(table){
    const letters=['B','I','N','G','O'];
    const thead=document.createElement('thead');
    const htr=document.createElement('tr');
    letters.forEach(l=>{
      const th=document.createElement('th');
      th.textContent=l;
      htr.appendChild(th);
    });
    thead.appendChild(htr);
    table.appendChild(thead);
    const tbody=document.createElement('tbody');
    for(let r=0;r<5;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<5;c++){
        const td=document.createElement('td');
        td.dataset.row=r;td.dataset.col=c;
        if(r===2&&c===2){
          td.classList.add('free','selected');
          const img=document.createElement('img');
          img.src=LOGO_URL;
          img.alt='logo';
          img.style.width='100%';
          img.style.height='100%';
          img.style.objectFit='contain';
          td.appendChild(img);
          td.addEventListener('click',()=>{
            const wrapper=table.closest('.carton-wrapper');
            if(wrapper) flipCard(wrapper);
          });
        }else{
          td.addEventListener('click',()=>{
          td.classList.toggle('selected');
          td.innerHTML = td.classList.contains('selected') ? '<span class="star">\u2605</span>' : '';
            saveState();
          });
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
  }

  function actualizarTotales(){
    const porcentajes=Array.from(document.querySelectorAll('.porcentaje-forma')).map(i=>parseFloat(i.value)||0);
    const totalPorcentaje=porcentajes.reduce((a,b)=>a+b,0);
    const restanteVal=100-totalPorcentaje;
    const restante=Math.max(0,Math.round(restanteVal));
    document.querySelectorAll('.porcentaje-restante').forEach(span=>{
      span.textContent=restante+'%';
      span.style.color=totalPorcentaje>=100?'red':'#006400';
    });
    document.querySelectorAll('.porcentaje-forma').forEach(inp=>{inp.style.color='green';});
    const cartones=Array.from(document.querySelectorAll('.cartones-forma')).map(i=>parseInt(i.value)||0);
    const totalCartones=cartones.reduce((a,b)=>a+b,0);
    document.querySelectorAll('.cartones-total').forEach(span=>{span.textContent=totalCartones;});
    const cartonesSegundo=Array.from(document.querySelectorAll('.cartones-forma-2')).map(i=>parseInt(i.value)||0);
    const totalCartonesSegundo=cartonesSegundo.reduce((a,b)=>a+b,0);
    document.querySelectorAll('.cartones-total-2').forEach(span=>{span.textContent=totalCartonesSegundo;});
  }

  function obtenerColorForma(idx){
    return FORMA_COLORES[idx]||'#90ee90';
  }

  function obtenerPosicionesDeTab(tab){
    const posiciones=[];
    tab.querySelectorAll('td.selected').forEach(td=>{
      const r=parseInt(td.dataset.row,10);
      const c=parseInt(td.dataset.col,10);
      if(r===2&&c===2) return;
      posiciones.push({r,c});
    });
    return posiciones;
  }

  function generarClavePosiciones(posiciones){
    return posiciones
      .map(p=>`${p.r}-${p.c}`)
      .sort()
      .join('|');
  }

  function crearMiniaturaForma(data){
    const cont=document.createElement('div');
    cont.className='forma-miniatura';
    cont.dataset.id=data.id;
    cont.dataset.indice=data.indice;
    cont.style.setProperty('--forma-color',obtenerColorForma(data.indice));
    const wrapper=document.createElement('div');
    wrapper.className='mini-tabla-wrapper';
    const table=document.createElement('table');
    table.className='mini-forma';
    const posicionesSet=new Set((data.posiciones||[]).map(p=>`${p.r}-${p.c}`));
    for(let r=0;r<5;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<5;c++){
        const td=document.createElement('td');
        if(r===2&&c===2){
          td.classList.add('centro');
          const span=document.createElement('span');
          span.className='mini-star centro';
          span.textContent='★';
          td.appendChild(span);
        }else if(posicionesSet.has(`${r}-${c}`)){
          td.classList.add('star');
          const span=document.createElement('span');
          span.className='mini-star';
          span.textContent='★';
          td.appendChild(span);
        }
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
    wrapper.appendChild(table);
    cont.appendChild(wrapper);
    const nombre=document.createElement('span');
    nombre.className='mini-nombre';
    nombre.textContent=data.nombre||'Sin nombre';
    cont.appendChild(nombre);
    cont.addEventListener('click',()=>seleccionarFormaModal(cont,data.id));
    return cont;
  }

  async function cargarFormasModal(idx){
    const grid=document.getElementById('formas-grid');
    if(!grid) return;
    grid.innerHTML='<div class="formas-empty">Cargando...</div>';
    formasModalDatos=[];
    formaSeleccionadaId=null;
    try{
      const snap=await db.collection(FORMAS_COLLECTION).where('indice','==',idx).get();
      if(snap.empty){
        grid.innerHTML='<div class="formas-empty">No hay formas guardadas para esta pestaña.</div>';
        return;
      }
      const frag=document.createDocumentFragment();
      snap.forEach(doc=>{
        const datos=doc.data()||{};
        const info={
          id:doc.id,
          indice:idx,
          nombre:datos.nombre||'',
          posiciones:Array.isArray(datos.posiciones)?datos.posiciones.map(p=>({r:p.r,c:p.c})):[]
        };
        formasModalDatos.push(info);
        const item=crearMiniaturaForma(info);
        frag.appendChild(item);
      });
      grid.innerHTML='';
      grid.appendChild(frag);
    }catch(e){
      console.error('cargarFormasModal',e);
      grid.innerHTML='<div class="formas-empty">No se pudieron cargar las formas guardadas.</div>';
    }
  }

    if(etiqueta) etiqueta.textContent=`F${idx}`;

    const modal=document.getElementById('formas-modal');
    if(modal) modal.classList.remove('visible');

    formasModalDatos=[];

  function seleccionarFormaModal(element,id){
    const grid=document.getElementById('formas-grid');

  function obtenerFormaSeleccionada(){

  function aplicarFormaATab(tab,datos,opciones={}){
    if(!tab||!datos) return;
    const nombreInput=tab.querySelector('.nombre-forma');
    if(opciones.asignarNombre!==false && nombreInput){
      nombreInput.value=datos.nombre||'';
    }
    const wrapper=tab.querySelector('.carton-wrapper');
    tab.querySelectorAll('td').forEach(td=>{
      const row=parseInt(td.dataset.row,10);
      const col=parseInt(td.dataset.col,10);
      td.innerHTML='';
      if(row===2&&col===2){
        td.classList.add('free','selected');
        const img=document.createElement('img');
        img.src=LOGO_URL;
        img.alt='logo';
        img.style.width='100%';
        img.style.height='100%';
        img.style.objectFit='contain';
        td.appendChild(img);
      }else{
        td.classList.remove('selected');
      }
    });
    (datos.posiciones||[]).forEach(p=>{
      const td=tab.querySelector(`td[data-row="${p.r}"][data-col="${p.c}"]`);
      if(td && !(p.r===2&&p.c===2)){
        td.classList.add('selected');
        td.innerHTML='<span class="star">★</span>';
      }
    });
    if(wrapper){
      updateCartonBack(wrapper);
    }
    saveState();
  }

  async function guardarFormaCatalogo(idx,tab){
    const nombreInput=tab.querySelector('.nombre-forma');
    const nombre=nombreInput?nombreInput.value.trim():'';
    if(!nombre){
      alert('Debes asignar un nombre a la forma para guadarla');
      if(nombreInput) nombreInput.focus();
      return;
    }
    const posiciones=obtenerPosicionesDeTab(tab);
    if(posiciones.length===0){
      alert('Debes elegir al menos una posición para la forma');
      return;
    }
    const claveActual=generarClavePosiciones(posiciones);
    const editingId=formaEdicionPorTab[idx]||null;
    try{
      const snap=await db.collection(FORMAS_COLLECTION).where('indice','==',idx).get();
      let duplicado=null;
      snap.forEach(doc=>{
        const info=doc.data()||{};
        const claveDoc=generarClavePosiciones((info.posiciones||[]).map(p=>({r:p.r,c:p.c})));
        if(claveDoc===claveActual && doc.id!==editingId){
          duplicado=doc;
        }
      });
      if(duplicado){
        alert(`Ya existe una forma con estas posiciones en Forma ${idx}, debes combinar diferente para poder guardar`);
        return;
      }
      const payload={
        indice:idx,
        nombre,
        posiciones,
        actualizado:firebase.firestore.FieldValue.serverTimestamp()
      };
      let mensaje='Forma guardada correctamente';
      if(editingId){
        await db.collection(FORMAS_COLLECTION).doc(editingId).set(payload,{merge:true});
        formaEdicionPorTab[idx]=editingId;
        mensaje='Forma actualizada correctamente';
      }else{
        payload.creado=firebase.firestore.FieldValue.serverTimestamp();
        await db.collection(FORMAS_COLLECTION).add(payload);
        formaEdicionPorTab[idx]=null;
      }
      alert(mensaje);
      if(document.getElementById('formas-modal')?.classList.contains('visible') && modalFormaIdx===idx){
        await cargarFormasModal(idx);
      }
    }catch(e){
      console.error('guardarFormaCatalogo',e);
      alert('Ocurrió un error al guardar la forma');
    }
  }

  async function subirImagen(file){
    const formData=new FormData();
    formData.append('file',file);
    const token=await auth.currentUser.getIdToken();
    const res=await fetch(UPLOAD_ENDPOINT,{method:'POST',headers:{Authorization:'Bearer '+token},body:formData});
    const data=await res.json();
    if(!res.ok) throw new Error(data.message || data.error || 'Error al subir imagen');
    return data.url;
  }

  document.getElementById('actualizar-sorteo-btn').addEventListener('click',async()=>{

    if(loteriasSeleccionadas.size===0){alert('Debes seleccionar al menos una lotería activa para el sorteo.');return;}
    if(cierreVal && hora && cierreVal>hora){
      alert('La hora de cierre no puede ser mayor a la hora del sorteo');

      return;
    }
    if(premioInicialVal!==null && (!Number.isFinite(premioInicialVal) || premioInicialVal<0)){
      alert('El premio inicial debe ser un número válido igual o mayor a 0.');
