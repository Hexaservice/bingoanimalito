<html lang="es">
<head>

  <link rel="icon" type="image/png" sizes="192x192" href="img/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/x-icon" sizes="16x16" href="img/favicon-16x16.ico">

  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    body {background: linear-gradient(rgba(255,255,255,0.7),rgba(255,255,255,0.7)), url('https://img.freepik.com/vectores-premium/padrao-sem-costura-com-simbolos-de-dolar-e-porcentagem_637741-777.jpg'); background-repeat: repeat; text-align:center; font-family: 'Bangers', cursive; padding:5px; margin:0;}
    .menu-btn{width:120px;height:40px;background:orange;border:4px solid #FFD700;border-radius:10px;color:#fff;text-shadow:2px 2px 4px #000;font-size:1rem;display:flex;align-items:center;justify-content:center;gap:5px;}
    .back-btn{position:fixed;top:5px;left:5px;font-family:'Bangers',cursive;font-size:1.2rem;text-transform:uppercase;}
    .icon-btn{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;border:1px solid #ccc;border-radius:4px;padding:4px 8px;margin:0 2px;cursor:pointer;}
    .icon-btn .icon.check{color:green;}
    .icon-btn .icon.edit{color:blue;}
    .icon-only{padding:4px;width:24px;height:24px;justify-content:center;gap:0;}
    .archivo-activo{background:#654321;color:#fff;}
    #ver-arch-ret .archivo-text{display:none;}
    table{margin:5px auto;border-collapse:collapse;width:100%;font-size:0.8rem;font-family:Calibri, Arial, sans-serif;background:rgba(255,255,255,0.6);table-layout:fixed;}
    th,td{border:1px solid #ccc;padding:2px;white-space:nowrap;font-weight:bold;}
    #tabla-recargas th:nth-child(3),#tabla-recargas td:nth-child(3),
    #tabla-recargas th:nth-child(4),#tabla-recargas td:nth-child(4),
    #tabla-retiros th:nth-child(3),#tabla-retiros td:nth-child(3),
    #tabla-retiros th:nth-child(4),#tabla-retiros td:nth-child(4){white-space:normal;word-break:break-word;}
    #tabla-recargas th:nth-child(4),#tabla-recargas td:nth-child(4),
    #tabla-retiros th:nth-child(4),#tabla-retiros td:nth-child(4){padding:0 1px;}
    th{position:sticky;top:40px;background:rgba(255,255,255,0.8);z-index:1;}
    tbody tr{background:rgba(255,255,255,0.95);}
    .anulado td:not(:first-child){color:red!important;}
    .switch{position:relative;display:inline-block;width:42px;height:24px;}
    .acciones{position:sticky;top:0;z-index:2;background:rgba(255,255,255,0.9);display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:4px;padding:4px 0;margin:0;}
    .section-header{display:flex;justify-content:space-between;align-items:center;padding:2px 5px;background:rgba(255,255,255,0.4);margin-bottom:4px;}
    .header-controls{display:flex;align-items:center;gap:5px;}
    #recargas-section h3{margin:0;color:green;text-shadow:0 0 5px #fff,2px 2px 3px #000;font-size:1.4rem;}
    #retiros-section h3{margin:0;color:red;text-shadow:0 0 5px #fff,2px 2px 3px #000;font-size:1.4rem;}
    #retiros-anticipados-section h3{margin:0;color:#ffd700;text-shadow:0 0 5px #fff,2px 2px 3px #000;font-size:1.4rem;}
    .switch input{display:none;}
    .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:24px;}
    .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%;}
    input:checked + .slider{background-color:#4caf50;}
    input:checked + .slider:before{transform:translateX(18px);}
    .badge{display:none;align-items:center;justify-content:center;min-width:25px;height:25px;background:red;color:#fff;border-radius:50%;font-size:0.9rem;animation:pulse 1s infinite;}
    @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
    @media (max-width:1023px) and (orientation:portrait){
      body{padding:2px;}
      table{font-size:0.6rem;width:100%;margin:2px 0;}
      .acciones{margin:2px 0;}
      .section-header{margin-bottom:2px;}
      #recargas-content,#retiros-content{max-height:70vh;overflow:auto;}
      #tabla-recargas col:nth-child(2),#tabla-retiros col:nth-child(2){width:calc(9% - 4px);}
      #tabla-recargas col:nth-child(4),#tabla-retiros col:nth-child(4){width:calc(17% - 10px);}
      #tabla-recargas col:nth-child(5),#tabla-retiros col:nth-child(5){width:calc(11% - 4px);}
      #tabla-recargas col:nth-child(7),#tabla-retiros col:nth-child(7){width:19%;}
      #tabla-recargas col:nth-child(8),#tabla-retiros col:nth-child(8){width:12%;}
      #volver-btn{width:40px;}
      #volver-btn .label{display:none;}
      #ver-arch-ret{padding:4px;width:24px;height:24px;justify-content:center;gap:0;}
    }
    @media (min-width:1024px){
      table{font-size:0.9rem;}
      #volver-btn{width:120px;}
      #volver-btn .label{display:inline;}
      #ver-arch-ret{padding:4px 8px;width:auto;height:auto;gap:4px;}
      #ver-arch-ret .archivo-text{display:inline;}
    }
    @media (min-width:1280px){table{font-size:1rem;}}

    #tabla-recargas td:nth-child(5),#tabla-retiros td:nth-child(5){font-size:1rem;}
    td.nota-estado{position:relative;cursor:pointer;}
    td.nota-estado::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      width:0;
      height:0;
      border-top:8px solid red;
      border-right:8px solid transparent;
    }
  </style>

<body>
  <button id="volver-btn" class="menu-btn back-btn" data-compact-back="true"><span class="icon">&#9664;</span><span class="label">Volver</span></button>
  <h2>Gestionar transferencias</h2>
  <div id="recargas-section">
    <div class="section-header">
      <h3>Gestionar Recargas</h3>
      <div class="header-controls">
        <span id="badge-rec" class="badge"></span>

    <div id="recargas-content">

      <table id="tabla-recargas">
        <colgroup>
          <col style="width:5%">
          <col style="width:10%">
          <col style="width:15%">

          <col style="width:15%">

        </colgroup>
        <thead>

            <th>N°</th>

            <th><input id="filtro-rec-ref" type="text" placeholder="Referencia" inputmode="numeric" maxlength="5" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,5);" style="width:100%;box-sizing:border-box;"></th>

            <th><select id="filtro-rec-estado" style="width:100%;"><option value="">Estado</option><option value="PENDIENTE">Pendiente</option><option value="APROBADO">Aprobado</option><option value="ACEPTADO">Aceptado</option><option value="ANULADO">Anulado</option></select></th>

  </div>
  <div id="retiros-section">
    <div class="section-header">

        <span id="badge-ret" class="badge"></span>
        <label class="switch"><input type="checkbox" id="toggle-retiros"><span class="slider"></span></label>

    </div>
    <div id="retiros-content">
      <div class="acciones">
        <button id="aprobar-ret" class="icon-btn" title="Aprobar"><span class="icon check">&#10004;</span><span>Aprobar</span></button>
        <button id="editar-ret" class="icon-btn" title="Editar"><span class="icon edit">&#9998;</span><span>Editar</span></button>
        <button id="anular-ret" class="icon-btn" title="Anular"><span class="icon">&#10060;</span><span>Anular</span></button>
        <button id="archivar-ret" class="icon-btn" title="Archivar"><span class="icon">&#128194;</span><span>Archivar</span></button>

          <col style="width:15%">

          <col style="width:calc(15% - 4px)">
          <col style="width:15%">
          <col style="width:15%">
          <col style="width:8%">
        </colgroup>
        <thead>
          <tr>
            <th>N°</th>
            <th><input id="filtro-ret-monto" type="text" placeholder="Monto" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'');" style="width:100%;box-sizing:border-box;"></th>
            <th><input id="filtro-ret-nombre" type="text" placeholder="Gmail" oninput="this.value=this.value.replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ ]/g,'');" style="width:100%;box-sizing:border-box;"></th>
            <th><select id="filtro-ret-banco" style="width:100%;"><option value="">Banco</option></select></th>
            <th><input id="filtro-ret-ref" type="text" placeholder="Referencia" inputmode="numeric" maxlength="5" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,5);" style="width:100%;box-sizing:border-box;"></th>
            <th><input id="filtro-ret-fecha" type="date" style="width:100%;box-sizing:border-box;"></th>
            <th><select id="filtro-ret-estado" style="width:100%;"><option value="">Estado</option><option value="PENDIENTE">Pendiente</option><option value="APROBADO">Aprobado</option><option value="ACEPTADO">Aceptado</option><option value="ANULADO">Anulado</option></select></th>

  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore-compat.js"></script>

  <script>
    let transRef = null;
    const datosRec = [];
    const datosRet = [];
    const datosRetAnt = [];
    const hasRetAntUI = false;
    let unsubscribeTransacciones = null;
    function volverConFallback(){
      const role=(window.currentRole||'').trim();
      if(role && typeof redirectByRole==='function'){
        redirectByRole(role);
        return;
      }
      if(window.history.length>1){
        window.history.back();
        return;
      }
      if(typeof redirectByRole==='function'){
        redirectByRole('Colaborador');
      }else{
        window.location.href='collab.html';
      }
    }
    function loadRefCookies(){
      const m=document.cookie.match(/refVals=([^;]+)/);
      if(m){
        try{return JSON.parse(decodeURIComponent(m[1]));}
        catch(e){}
      }
      return {};
    }
    function saveRefCookies(){
      document.cookie=`refVals=${encodeURIComponent(JSON.stringify(refCookies))};path=/;max-age=31536000`;
    }
    let refCookies=loadRefCookies();
    let mostrarRecArch=false;
    let mostrarRetArch=false;
    let mostrarRetAntArch=false;

    function normalizarTipoOperacion(transaccion){
      const tipo=(transaccion.tipotrans||'').toLowerCase();
      if(tipo==='retiro') return 'retiro';
      if(tipo==='recarga' || tipo==='deposito') return 'recarga';
      return tipo || 'recarga';
    }
    function actualizarArchivarRecBtn(){
      const btn=document.getElementById('archivar-rec');
      const icon=btn.querySelector('.icon');
      const txt=btn.querySelector('span:last-child');
      if(mostrarRecArch){
        txt.textContent='Desarchivar';
        icon.innerHTML='&#128193;';
        icon.style.color='blue';
      }else{
        txt.textContent='Archivar';
        icon.innerHTML='&#128194;';
        icon.style.color='';
      }
    }
    function actualizarArchivarRetBtn(){
      const btn=document.getElementById('archivar-ret');
      const icon=btn.querySelector('.icon');
      const txt=btn.querySelector('span:last-child');
      if(mostrarRetArch){
        txt.textContent='Desarchivar';
        icon.innerHTML='&#128193;';
        icon.style.color='blue';
      }else{
        txt.textContent='Archivar';
        icon.innerHTML='&#128194;';
        icon.style.color='';
      }
    }
    function actualizarArchivarRetAntBtn(){
      if(!hasRetAntUI) return;
      const btn=document.getElementById('archivar-ret-ant');
      const icon=btn.querySelector('.icon');
      const txt=btn.querySelector('span:last-child');
      if(mostrarRetAntArch){
        txt.textContent='Desarchivar';
        icon.innerHTML='&#128193;';
        icon.style.color='blue';
      }else{
        txt.textContent='Archivar';
        icon.innerHTML='&#128194;';
        icon.style.color='';
      }
    }
    const filtrosRec={monto:'',nombre:'',banco:'',ref:'',fecha:'',estado:''};
    const filtrosRet={monto:'',nombre:'',banco:'',ref:'',fecha:'',estado:''};
    const filtrosRetAnt={monto:'',nombre:'',banco:'',ref:'',fecha:'',estado:''};
    function fecha(){return fechaServidor();}
    function hora(){return horaServidor();}

    function solicitarMotivo(){
      return new Promise(res=>{
        const overlay=document.createElement('div');
        Object.assign(overlay.style,{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center'});
        const box=document.createElement('div');
        Object.assign(box.style,{background:'#fff',padding:'10px',borderRadius:'8px',display:'flex',flexDirection:'column',gap:'5px'});
        const aviso=document.createElement('div');
        aviso.textContent='Una vez ANULADO el registro no se puede revertir esta acción';
        aviso.style.fontWeight='bold';
        const sel=document.createElement('select');
        sel.innerHTML='<option value="">Seleccione</option><option value="Monto de recarga no corresponde">Monto de recarga no corresponde</option><option value="No existe recarga solicitada">No existe recarga solicitada</option><option value="Otro">Otro</option>';
        const inp=document.createElement('input');
        inp.type='text';inp.placeholder='Motivo';inp.style.display='none';
        const btnOk=document.createElement('button');btnOk.textContent='Aceptar';
        const btnCan=document.createElement('button');btnCan.textContent='Cancelar';
        sel.addEventListener('change',()=>{inp.style.display=sel.value==='Otro'?'block':'none';});
        btnOk.addEventListener('click',()=>{
          let val=sel.value;
          if(!val){alert('Debes seleccionar un motivo');return;}
          if(val==='Otro'){
            val=inp.value.trim();
            if(!val){alert('Debes colocar un motivo para anulación');return;}
          }
          document.body.removeChild(overlay);
          res(val);
        });
        btnCan.addEventListener('click',()=>{document.body.removeChild(overlay);res(null);});
        box.appendChild(aviso);
        box.appendChild(sel);
        box.appendChild(inp);
        box.appendChild(btnOk);
        box.appendChild(btnCan);
        overlay.appendChild(box);
        document.body.appendChild(overlay);
        sel.focus();
      });
    }

    function toggleView(id,content){
      const el=document.getElementById(id);
      el.addEventListener('change',()=>{content.style.display=el.checked?'block':'none';});
      content.style.display='none';
    }

    async function cargarBancos(){
      const selRec=document.getElementById('filtro-rec-banco');
      const snapRec=await db.collection('Bancos').where('categoria','==','Bingo').where('estado','==','Activo').get();
      snapRec.forEach(doc=>{
        const nombre=doc.data().nombre||doc.id;
        const opt=document.createElement('option');
        opt.value=nombre;
        opt.textContent=nombre;
        selRec.appendChild(opt);
      });
      const selRet=document.getElementById('filtro-ret-banco');
      const snapRet=await db.collection('Bancos').where('categoria','==','Jugadores').where('estado','==','Activo').get();
      snapRet.forEach(doc=>{
        const nombre=doc.data().nombre||doc.id;
        const opt=document.createElement('option');
        opt.value=nombre;
        opt.textContent=nombre;
        selRet.appendChild(opt);
        if(hasRetAntUI){
          const optAnt=opt.cloneNode(true);
          document.getElementById('filtro-ret-ant-banco').appendChild(optAnt);
        }
      });
    }

    function procesarTransacciones(snap){
      datosRec.length=0;
      datosRet.length=0;
      datosRetAnt.length=0;
      snap.forEach(d=>{
        const dt={id:d.id,...d.data()};
        dt.Condicion = dt.Condicion || (dt.estado==='ARCHIVADO'?'ARCHIVADA':'VISIBLE');
        const tipo=normalizarTipoOperacion(dt);
        const dtNormalizado={...dt, tipotrans:tipo};
        const esRetiroAnticipado=tipo==='premio' && dtNormalizado?.retiroAdelantado===true;
        if(tipo==='recarga') datosRec.push(dtNormalizado);
        else if(tipo==='retiro') datosRet.push(dtNormalizado);
        else if(hasRetAntUI && esRetiroAnticipado) datosRetAnt.push(dtNormalizado);
      });
      datosRec.sort(sortTrans);
      datosRet.sort(sortTrans);
      if(hasRetAntUI) datosRetAnt.sort(sortTrans);
      renderRec();
      renderRet();
      if(hasRetAntUI) renderRetAnt();
      actualizarPendientes();
      actualizarEditable();
    }
    function actualizarPendientes(){
      const pendientesRec=datosRec.filter(t=>t.estado==='PENDIENTE').length;
      const pendientesRet=datosRet.filter(t=>t.estado==='PENDIENTE').length;
      const badgeRec=document.getElementById('badge-rec');
      badgeRec.textContent=pendientesRec;
      badgeRec.style.display=pendientesRec?'inline-flex':'none';
      const badgeRet=document.getElementById('badge-ret');
      badgeRet.textContent=pendientesRet;
      badgeRet.style.display=pendientesRet?'inline-flex':'none';
      if(hasRetAntUI){
        const pendientesRetAnt=datosRetAnt.filter(t=>t.estado==='PENDIENTE').length;
        const badgeRetAnt=document.getElementById('badge-ret-ant');
        badgeRetAnt.textContent=pendientesRetAnt;
        badgeRetAnt.style.display=pendientesRetAnt?'inline-flex':'none';
      }
    }
    function abreviar(mail){return mail.split('@')[0];}
    function estadoNormalizadoComparable(valor){
      const texto=(valor||'').toString().trim().toUpperCase();
      if(window.EstadosPagoPremio && typeof window.EstadosPagoPremio.normalizarLectura==='function'){
        return window.EstadosPagoPremio.normalizarLectura(texto, texto || 'PENDIENTE');
      }
      return texto==='REALIZADO'?'APROBADO':texto;
    }
    function estadoEsAprobado(valor){
      const estado=estadoNormalizadoComparable(valor);
      return estado==='APROBADO' || estado==='ACEPTADO';
    }
    function estadoColor(e){
      if((e||'').toString().toUpperCase()==='ACEPTADO') return '#fff';
      if(estadoEsAprobado(e)) return 'green';
      return e==='ANULADO'?'red':'orange';
    }
    function notificacionLeida(transaccion){
      const interna=transaccion && transaccion.notificacionInterna ? transaccion.notificacionInterna : {};
      return Boolean((interna && interna.aceptada) || transaccion.mensajeLeido===true);
    }
    async function mostrarInfoGmail(mail){
      const overlay=document.createElement('div');
      Object.assign(overlay.style,{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center'});
      const box=document.createElement('div');
      Object.assign(box.style,{background:'#fff',padding:'15px',borderRadius:'8px',display:'flex',flexDirection:'column',gap:'8px',minWidth:'260px',fontFamily:'Calibri, Arial, sans-serif',fontSize:'1.1rem',fontWeight:'bold'});
      box.textContent='Cargando...';
      overlay.appendChild(box);
      document.body.appendChild(overlay);
      const [uDoc,bDoc]=await Promise.all([
        db.collection('users').doc(mail).get(),
        db.collection('Billetera').doc(mail).get()
      ]);
      const u=uDoc.data()||{};
      const b=bDoc.data()||{};
      box.innerHTML = `

    function formatearFecha(f){
      if(!f) return '';
      if(f.includes('-')){
        const[y,m,d]=f.split('-');
        return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
      }
      const[d,m,y]=f.split('/');
      return `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
    }
    function parseFecha(f){
      if(!f) return 0;
      if(f.includes('-')){
        const[y,m,d]=f.split('-');
        return new Date(`${y}-${m}-${d}`).getTime();
      }
      const[d,m,y]=f.split('/');
      return new Date(`${y}-${m}-${d}`).getTime();
    }
    function aHora24(str){
      if(!str) return '00:00';
      str=str.toLowerCase().replace(/\./g,'').replace(/\s+/g,'');
      const m=str.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?(a|p)?m?/);
      if(!m) return str;
      let h=parseInt(m[1],10);
      const min=m[2];
      const ap=m[4];
      if(ap==='p'&&h<12)h+=12;
      if(ap==='a'&&h===12)h=0;
      return `${String(h).padStart(2,'0')}:${min}`;
    }
    function formatearHora(str){
      if(!str) return '';
      const [h24,min]=aHora24(str).split(':');
      let h=parseInt(h24,10);
      const ampm=h>=12?'pm':'am';
      h=h%12;
      if(h===0)h=12;
      return `${h}:${min} ${ampm}`;
    }
    function formatearMonto(valor){
      const num=parseFloat(valor);
      if(isNaN(num))return valor;
      return num%1===0?num.toString():num.toFixed(2);
    }

      if(a.estado==='PENDIENTE'&&b.estado!=='PENDIENTE')return -1;
      if(a.estado!=='PENDIENTE'&&b.estado==='PENDIENTE')return 1;
      return parseFecha(b.fechasolicitud)-parseFecha(a.fechasolicitud);
    }

          mensajeRetiroAprobado:obtenerMensajePersistido(data,'mensajeRetiroAprobado')||MENSAJES_RESULTADOS_INTERNOS_DEFAULT.mensajeRetiroAprobado,

    function aplicarPlantillaMensaje(plantilla,valores){
      return (plantilla||'').replace(/<([a-zA-Z0-9_]+)>/g,(_,clave)=>{
        const valor=valores[clave];
        return valor===undefined || valor===null ? '' : String(valor);
      }).trim();
    }

    async function construirMensajeResultado(transaccion,estadoFinal,nota){
      const plantillas=await cargarPlantillasMensajesInternos();
      const tipo=normalizarTipoOperacion(transaccion);
      const montoSolicitadoNum=toNumberSafe(transaccion.MontoSolicitado??transaccion.Monto,transaccion.Monto);
      const montoTransferidoNum=toNumberSafe(transaccion.Monto,transaccion.MontoSolicitado??transaccion.Monto);
      const comisionTotal=Math.max(0,montoSolicitadoNum-montoTransferidoNum);
      const formatearEnteroSeguro=valor=>Math.trunc(toNumberSafe(valor,0)).toString();
      const montoSolicitado=formatearEnteroSeguro(montoSolicitadoNum);
      const montoTransferido=formatearEnteroSeguro(montoTransferidoNum);
      const referenciaTexto=(transaccion.referencia||'').toString().trim();
      const nombreUsuario=((transaccion.Usuario||transaccion.Nombre||transaccion.usuario||transaccion.IDbilletera)||'').toString().trim()||'Jugador';
      const valoresBase={
        monto:montoSolicitado,
        app:'Bingo Animalito',
        usuario:nombreUsuario,
        fecha:fecha(),
        motivo:(nota||'No especificado').toString().trim(),
        referencia:referenciaTexto||'pendiente',
        totalTransferido:montoTransferido,
        comisionBancaria:formatearEnteroSeguro(transaccion.comisionBancaria ?? transaccion.ComisionBancaria ?? comisionTotal),
        comisionGestion:formatearEnteroSeguro(transaccion.comisionGestion ?? transaccion.ComisionGestion ?? 0)
      };
      const clavePlantilla=(tipo==='retiro')
        ? (estadoFinal==='APROBADO'?'mensajeRetiroAprobado':'mensajeRetiroAnulado')
        : (estadoFinal==='APROBADO'?'mensajeRecargaAprobada':'mensajeRecargaAnulada');
      const plantilla=plantillas[clavePlantilla]||MENSAJES_RESULTADOS_INTERNOS_DEFAULT[clavePlantilla]||'';
      return aplicarPlantillaMensaje(plantilla,valoresBase);
    }

    async function actualizar(ids,estado,nota,ref,condicion){
      await initServerTime();
      for(const id of ids){
        const doc=await transRef.doc(id).get();
        const data=doc.data();
        if(!data) continue;
        const upd={
          usuariogestor:auth.currentUser.email,
          rolusuario:window.currentRole,
          fechagestion:fecha(),
          horagestion:hora()
        };
        if(estado)upd.estado=estado;
        if(nota)upd.nota=nota;
        if(ref)upd.referencia=ref;
        if(condicion)upd.Condicion=condicion;
        else if(!data.Condicion)upd.Condicion='VISIBLE';

        const tipo=normalizarTipoOperacion(data);
        const billeteraId=((data && data.IDbilletera)||'').toString();
        const esRetiro=tipo==='retiro';
        const esRecarga=tipo==='recarga';

        if(billeteraId && estado==='ANULADO' && esRetiro){
          const billeteraRef=db.collection('Billetera').doc(billeteraId);
          await db.runTransaction(async t=>{
            const bdoc=await t.get(billeteraRef);
            const billeteraData=bdoc.exists?(bdoc.data()||{}):{};
            const montoTransaccion=toNumberSafe((data.MontoSolicitado ?? data.Monto),0);
            const transitoActual=Math.max(0,toNumberSafe(billeteraData.creditostransito,0));
            const payload={ creditostransito: Math.max(0,transitoActual-montoTransaccion) };
            t.set(billeteraRef,payload,{merge:true});
          });
        }

        if(billeteraId && estado==='APROBADO' && esRecarga && !estadoEsAprobado(data.estado)){
          const billeteraRef=db.collection('Billetera').doc(billeteraId);
          await db.runTransaction(async t=>{
            const bdoc=await t.get(billeteraRef);
            const billeteraData=bdoc.exists?(bdoc.data()||{}):{};
            const montoTransaccion=toNumberSafe((data.Monto ?? data.MontoSolicitado),0);
            const creditosActual=toNumberSafe(billeteraData.creditos,0);
            t.set(billeteraRef,{ creditos: creditosActual+montoTransaccion },{merge:true});
          });
          upd.acreditacionAplicada=true;
        }

        if(estado==='APROBADO' || estado==='ANULADO'){
          const mensajeInterno=await construirMensajeResultado({...data, referencia:ref||data.referencia||''},estado,nota);
          upd.notificacionInterna={
            mensaje:mensajeInterno,
            estadoObjetivo:estado,
            estadoPrevio:data.estado||'',
            pendienteMostrar:true,
            aceptada:false,
            creadaEn:firebase.firestore.FieldValue.serverTimestamp()
          };
          upd.mensajeLeido=false;
        }

        await transRef.doc(id).update(upd);
        delete refCookies[id];
      }
      saveRefCookies();
    }
